      .suno-title { font-size: 12px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .suno-artist { font-size: 11px; color: var(--dim); }
      .suno-duration { font-size: 10px; color: var(--faint); font-family: var(--font-mono); }
      .suno-transport { display: flex; align-items: center; gap: 6px; }
      .suno-btn { background: var(--bg2); border: 1px solid var(--line); color: var(--ink); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 14px; }
      .suno-btn.active { border-color: var(--amber); color: var(--amber); }
      .suno-btn-play { padding: 4px 14px; }
      .suno-scrub-wrap { display: flex; align-items: center; gap: 6px; }
      .suno-scrub { flex: 1; height: 3px; cursor: pointer; accent-color: var(--copper); }
      .suno-elapsed, .suno-remaining { font-size: 10px; font-family: var(--font-mono); color: var(--faint); min-width: 30px; }
      .suno-vol-wrap { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--faint); }
      .suno-volume { width: 60px; accent-color: var(--copper); cursor: pointer; }

      /* ── Main content area ──────────────────────────────────────────── */
      #content {
        display: grid;
        grid-template-columns: 1fr 1.6fr 1fr;
        gap: 0;
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }

      /* ── Panel columns ──────────────────────────────────────────────── */
      .panel-col {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 12px 14px;
        gap: 10px;
        min-height: 0;
      }
      .panel-col + .panel-col {
        border-left: 1px solid var(--line);
      }

      /* ── Section header (klabel style per DESIGN.md) ────────────────── */
      .klabel {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--amber);
        flex-shrink: 0;
      }
      .klabel::after {
        content: '';
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, var(--line), transparent);
      }
      .klabel-count {
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 500;
        color: var(--faint);
      }

      /* ── LEFT: Crew Board ───────────────────────────────────────────── */
      #board-panel {
        gap: 8px;
      }

      .hero-card {
        border-radius: 8px;
        background: var(--card);
        border: 1px solid var(--copper);
        padding: 12px 14px;
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }
      .hero-card.building {
        border-color: color-mix(in oklch, var(--copper) 70%, transparent);
        background:
          linear-gradient(180deg, var(--cell-bg-top) 0%, var(--cell-bg-bot) 100%);
        animation: hero-glow 2.6s ease-in-out infinite;
      }
      @keyframes hero-glow {
        0%, 100% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--copper) 0%, transparent); }
        50%       { box-shadow: 0 0 26px 5px color-mix(in oklch, var(--copper) 38%, transparent); }
      }
      .hero-card.building::after {
        content: '';
        position: absolute;
        top: 0; left: 0;
        width: 45%; height: 100%;
        background: linear-gradient(90deg, transparent, color-mix(in oklch, var(--amber) 10%, transparent), transparent);
        transform: translateX(-130%);
        animation: card-sweep 2.8s ease-in-out infinite;
      }
      @keyframes card-sweep {
        0%   { transform: translateX(-130%); }
        100% { transform: translateX(330%); }
      }
      @media (prefers-reduced-motion: reduce) {
        .live-dot, .hero-card.building, .hero-card.building::after { animation: none; }
      }

      .hero-label {
        font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--copper); margin-bottom: 4px;
      }
      .hero-title {
        font-size: 17px; font-weight: 800; color: var(--ink); letter-spacing: -0.01em;
        margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        text-shadow: 0 0 18px color-mix(in oklch, var(--amber) 12%, transparent);
      }
      .hero-slug {
        /* Ticket id is an identifier — use --dim (secondary), not --faint
           (tertiary). On code-fall, --faint is the theme green and rendered the
           id green-on-green; --dim is the neutral grey so it stays readable on
           every theme. font-weight 500 helps the thin mono faces (Share Tech). */
        font-family: var(--font-mono); font-size: 10px; font-weight: 500;
        color: var(--dim); margin-bottom: 8px;
      }
      .hero-meta { display: flex; gap: 14px; flex-wrap: wrap; }
      .hero-stat {
        font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--dim);
      }
      .hero-stat span { color: var(--amber); }
      .hero-extra { font-size: 10px; color: var(--faint); }
      .hero-empty { font-size: 12px; color: var(--faint); font-style: italic; }

      .board-section { flex-shrink: 0; }
      .task-list {
        display: flex; flex-direction: column; gap: 3px;
        margin-top: 4px; max-height: 120px;
        overflow-y: auto; overflow-x: hidden;
        scrollbar-width: thin; scrollbar-color: var(--line) transparent;
      }
      .task-row {
        display: flex; align-items: center; gap: 6px;
        padding: 4px 8px; border-radius: 5px;
        background: var(--card); border: 1px solid var(--line);
        cursor: default; transition: border-color 100ms;
      }
      .task-row:hover { border-color: var(--amber); }
      .task-status-dot {
        width: 5px; height: 5px; border-radius: 50%;
        flex-shrink: 0; background: var(--faint);
      }
      .task-status-dot.in_progress { background: var(--copper); }
      .task-status-dot.ready       { background: var(--amber); }
      .task-status-dot.qa          { background: var(--cyan); }
      /* review = amber per the canon (copper=building, amber=review). */
      .task-status-dot.review      { background: var(--amber); }
      .task-status-dot.done        { background: var(--green); }
      .task-title {
        font-size: 11px; font-weight: 600; color: var(--ink);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
      }
      .task-assignee { font-size: 10px; color: var(--faint); flex-shrink: 0; }

      /* ── CENTER: Telemetry Wall ──────────────────────────────────────── */
      #center-panel { gap: 8px; overflow-y: auto; overflow-x: hidden;
        scrollbar-width: thin; scrollbar-color: var(--line) transparent; }

      /* GPU cards */
      #gpu-panel { flex-shrink: 0; }
      .gpu-card-row { display: flex; gap: 8px; flex-wrap: wrap; }
      .gpu-card {
        background: var(--card); border: 1px solid var(--line);
        border-radius: 8px; padding: 10px 12px;
        display: flex; flex-direction: column; align-items: center; gap: 4px;
        min-width: 200px; flex: 1;
      }
      .gpu-card.gpu-no-signal { opacity: 0.45; }
      .gpu-card-label {
        font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--copper); align-self: flex-start;
      }
      .gpu-gauge-canvas { display: block; }
      .gpu-card-meta {
        display: flex; gap: 10px; font-family: var(--font-mono); font-size: 10px;
        color: var(--dim); align-self: stretch; justify-content: space-between;
      }
      .gpu-temp { color: var(--amber); }
      .gpu-vram { color: var(--cyan); }
      .gpu-spark { width: 100%; }
      .gpu-no-signal-label { font-size: 10px; color: var(--faint); font-style: italic; }
      .gpu-mini-strip {
        font-size: 10px; color: var(--faint); font-family: var(--font-mono);
        display: flex; gap: 8px; padding: 4px 0;
        border-top: 1px solid var(--line); opacity: 0.55;
      }
      .gpu-mini-game.active { color: var(--red); opacity: 1; }
      .gpu-host-card {
        background: var(--card); border: 1px solid var(--line);
        border-radius: 8px; padding: 10px 12px;
        font-size: 11px;
      }
      .host-card-label {
        font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--copper); margin-bottom: 6px;
      }
      .host-row { display: flex; gap: 6px; align-items: baseline; margin-bottom: 3px; }
      .host-metric-label {
        font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
        text-transform: uppercase; color: var(--faint); min-width: 36px;
      }
      .host-metric-val { font-family: var(--font-mono); font-size: 13px; color: var(--amber); }
      .host-dim { font-size: 10px; color: var(--faint); margin-left: 4px; }
      .host-disks { display: flex; flex-direction: column; gap: 3px; margin: 6px 0; }
      .host-disk { display: flex; align-items: center; gap: 6px; font-size: 10px; }
      .host-disk-label { color: var(--faint); min-width: 36px; }
      .host-bar-track {
        flex: 1; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden;
      }
      .host-bar-fill { height: 100%; background: var(--cyan); border-radius: 2px; }
      .host-disk-pct { font-family: var(--font-mono); font-size: 10px; color: var(--dim); min-width: 30px; text-align: right; }
      .host-bots { display: flex; gap: 4px; flex-wrap: wrap; margin: 4px 0; }
      .bot-dot { font-size: 12px; cursor: default; }
      .bot-dot.running { color: var(--green); }
      .bot-dot.stopped { color: var(--faint); }
      .host-uptime { font-size: 10px; color: var(--faint); font-family: var(--font-mono); }

      /* Telemetry charts */
      #telemetry-charts { flex-shrink: 0; }
      .chart-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
      .chart-cell {
        background: var(--card); border: 1px solid var(--line); border-radius: 8px;
        padding: 8px 10px; flex: 1; min-width: 200px;
      }
      .chart-cell-label {
        font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--faint); margin-bottom: 6px;
        display: flex; align-items: center; gap: 8px;
      }
      .chart-canvas-wrap { overflow: hidden; }
      /* uPlot resets */
      .u-wrap { background: transparent !important; }
      .u-over, .u-under { background: transparent !important; }

      /* Pipeline mini bar chart */
      .pipeline-cell { min-width: 260px; }
      .pipeline-bars { display: flex; gap: 4px; align-items: flex-end; height: 64px; margin-bottom: 4px; }
      .pipeline-col { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
      .pipeline-bar-track {
        width: 100%; background: var(--bg2); border-radius: 2px 2px 0 0;
        flex: 1; display: flex; flex-direction: column; justify-content: flex-end;
      }
      .pipeline-bar-fill { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; }
      .pipeline-count { font-family: var(--font-mono); font-size: 10px; font-weight: 700; }
      .pipeline-label { font-size: 9px; color: var(--faint); }
      .parsefail-indicator { font-family: var(--font-mono); font-size: 10px; color: var(--faint); }
      .parsefail-indicator.alarm { color: var(--red); animation: alarm-flash 0.8s ease-in-out infinite; }
      @keyframes alarm-flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      @media (prefers-reduced-motion: reduce) { .parsefail-indicator.alarm { animation: none; } }
      .throughput-val { font-family: var(--font-mono); font-size: 10px; color: var(--dim); }

      /* Activity ticker */
      #activity-section { flex: 1; min-height: 0; overflow: hidden; }
      #activity-ticker {
        height: 100%; overflow-y: auto; overflow-x: hidden;
        display: flex; flex-direction: column; gap: 2px;
        scrollbar-width: thin; scrollbar-color: var(--line) transparent;
        font-family: var(--font-mono); font-size: 11px;
      }
      .ticker-row {
        display: flex; align-items: baseline; gap: 6px;
        padding: 3px 6px; border-radius: 4px; background: var(--bg2);
        border: 1px solid var(--line);
      }
      .ticker-row.ticker-stub  { opacity: 0.5; font-style: italic; }
      .ticker-time { color: var(--faint); font-size: 10px; flex-shrink: 0; }
      .ticker-dot  { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
      .ticker-row.ticker-alert .ticker-dot { background: var(--red); }
      .ticker-row.ticker-done  .ticker-dot { background: var(--green); }
      .ticker-msg  { color: var(--dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      /* ── RIGHT: Graph + Agenda ───────────────────────────────────────── */
      #right-panel { gap: 8px; overflow-y: auto; overflow-x: hidden;
        scrollbar-width: thin; scrollbar-color: var(--line) transparent; }

      /* Knowledge graph placeholder */
      #graph-placeholder {
        border: 1px solid var(--line); border-radius: 8px;
        background: var(--card);
        flex-shrink: 0; height: 340px;
        display: flex; align-items: center; justify-content: center;
      }
      .graph-ph-inner { display: flex; flex-direction: column; align-items: center; gap: 8px; }
      .graph-ph-glyph { font-size: 48px; color: color-mix(in oklch, var(--copper) 30%, transparent); line-height: 1; }
      .graph-ph-label {
        font-size: 12px; font-weight: 700; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--faint);
      }
      .graph-ph-sub { font-size: 10px; color: var(--faint); opacity: 0.6; }

      /* Escalations */
      #escalations-section { flex-shrink: 0; }
      .esc-badge {
        font-family: var(--font-mono); font-size: 10px; font-weight: 700;
        color: var(--faint); margin-left: 4px;
      }
      .esc-badge.active { color: var(--red); }
      #escalations-panel {
        display: flex; flex-direction: column; gap: 4px;
        max-height: 160px; overflow-y: auto;
        scrollbar-width: thin; scrollbar-color: var(--line) transparent;
      }
      .esc-row {
        display: flex; align-items: flex-start; gap: 6px;
        padding: 5px 8px; background: var(--card);
        border: 1px solid color-mix(in oklch, var(--red) 45%, transparent); border-radius: 6px;
      }
      .esc-dot {
        width: 6px; height: 6px; border-radius: 50%; background: var(--red);
        flex-shrink: 0; margin-top: 3px;
      }
      .esc-body { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
      .esc-title { font-size: 11px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .esc-meta  { font-size: 9px; color: var(--faint); font-family: var(--font-mono); }

      /* Agenda */
      #agenda-section { flex-shrink: 0; }
      #agenda-panel {
        display: flex; flex-direction: column; gap: 4px;
        max-height: 160px; overflow-y: auto;
        scrollbar-width: thin; scrollbar-color: var(--line) transparent;
      }
      .agenda-row {
        display: flex; align-items: baseline; gap: 8px;
        padding: 5px 8px; background: var(--card);
        border: 1px solid var(--line); border-radius: 6px;
      }
      .agenda-time {
        font-family: var(--font-mono); font-size: 11px; font-weight: 700;
        color: var(--amber); flex-shrink: 0; min-width: 40px;
      }
      .agenda-body { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; }
      .agenda-title { font-size: 11px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .agenda-chip {
        font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
        background: var(--bg2); border: 1px solid var(--line); color: var(--dim);
        padding: 1px 5px; border-radius: 999px; flex-shrink: 0;
        font-family: var(--font-mono);
      }

      /* Stat cards (legacy Phase A / overview) */
      .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-shrink: 0; }
      .stat-card {
        background: var(--card); border: 1px solid var(--line);
        border-radius: 8px; padding: 10px 12px;
      }
      .stat-card.full-width { grid-column: 1 / -1; }
      .stat-label {
        font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--faint); margin-bottom: 4px;
      }
      .stat-value {
        font-family: var(--font-mono); font-size: 24px; font-weight: 700;
        color: var(--amber); font-variant-numeric: tabular-nums; line-height: 1;
      }
      .stat-sub { font-size: 10px; color: var(--dim); margin-top: 3px; }
      .cost-value {
        font-family: var(--font-mono); font-size: 20px; font-weight: 700;
        color: var(--cyan); font-variant-numeric: tabular-nums;
      }
      .token-row { display: flex; gap: 10px; margin-top: 4px; }
      .token-item { display: flex; flex-direction: column; }
      .token-label {
        font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--faint);
      }
      .token-value {
        font-family: var(--font-mono); font-size: 16px; font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .token-value.hive   { color: var(--green); }
      .token-value.claude { color: var(--violet); }
      .status-breakdown { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
      .status-chip {
        font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px;
        background: var(--bg2); border: 1px solid var(--line);
        color: var(--dim); font-variant-numeric: tabular-nums; font-family: var(--font-mono);
      }
      .status-chip.in_progress { color: var(--copper); border-color: var(--copper); }
      .status-chip.ready       { color: var(--amber);  border-color: var(--amber);  }
      .status-chip.done        { color: var(--green);  border-color: var(--green);  }
      .status-chip.qa          { color: var(--cyan);   border-color: var(--cyan);   }

      /* ── SUNO Player ─────────────────────────────────────────────── */
      #suno-section { flex-shrink: 0; }

      /* Now-playing card */
      .suno-now-card {
        background: var(--card); border: 1px solid var(--copper);
        border-radius: 8px; padding: 10px 12px;
        display: flex; flex-direction: column; gap: 8px;
      }
      .suno-art-row { display: flex; align-items: center; gap: 10px; }
      .suno-art {
        width: 52px; height: 52px; border-radius: 5px; object-fit: cover;
        flex-shrink: 0; background: var(--bg2); border: 1px solid var(--line);
      }
      .suno-art[src=""] { display: none; }
      .suno-meta { min-width: 0; flex: 1; }
      .suno-now-title {
        font-size: 13px; font-weight: 700; color: var(--ink);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .suno-now-artist { font-size: 11px; color: var(--copper); margin-top: 2px; }
      .suno-duration {
        font-family: var(--font-mono); font-size: 10px; color: var(--faint);
        margin-top: 2px;
      }

      /* Scrub bar */
      .suno-scrub-row {
        display: flex; align-items: center; gap: 6px;
        font-family: var(--font-mono); font-size: 10px; color: var(--faint);
      }
      #suno-scrub {
        flex: 1; height: 3px; cursor: pointer;
        accent-color: var(--copper);
        -webkit-appearance: none; appearance: none;
        background: var(--line); border-radius: 2px;
      }
      #suno-scrub::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 10px; height: 10px; border-radius: 50%;
        background: var(--copper); cursor: pointer;
      }

      /* Transport controls */
      .suno-transport {
        display: flex; align-items: center; justify-content: center; gap: 12px;
      }
      .suno-btn {
        background: none; border: none; cursor: pointer;
        color: var(--dim); font-size: 16px; line-height: 1;
        padding: 4px 6px; border-radius: 4px;
        transition: color 80ms, background 80ms;
      }
      .suno-btn:hover  { color: var(--amber); background: color-mix(in oklch, var(--amber) 8%, transparent); }
      .suno-btn.active { color: var(--copper); }
      #suno-btn-play {
        font-size: 20px; color: var(--amber);
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        border: 1px solid var(--copper); border-radius: 50%;
        background: color-mix(in oklch, var(--copper) 8%, transparent);
      }
      #suno-btn-play:hover { background: color-mix(in oklch, var(--copper) 18%, transparent); }

      /* Volume */
      .suno-vol-row {
        display: flex; align-items: center; gap: 6px;
        font-size: 10px; color: var(--faint);
      }
      #suno-volume {
        width: 64px; height: 3px; cursor: pointer;
        accent-color: var(--amber);
        -webkit-appearance: none; appearance: none;
        background: var(--line); border-radius: 2px;
      }

      /* List header: filter box + count */
      .suno-list-header {
        display: flex; align-items: center; gap: 6px;
        margin-top: 6px;
      }
      .suno-search {
        flex: 1; min-width: 0;
        font-family: inherit; font-size: 11px;
        color: var(--ink); background: var(--card);
        border: 1px solid var(--line); border-radius: 5px;
        padding: 3px 8px; outline: none;
        transition: border-color 100ms;
      }
      .suno-search::placeholder { color: var(--faint); }
      .suno-search:focus { border-color: var(--amber); }
      .suno-search::-webkit-search-cancel-button { -webkit-appearance: none; appearance: none; }
      .suno-count {
        flex-shrink: 0;
        font-size: 10px; color: var(--faint);
        font-variant-numeric: tabular-nums;
        min-width: 28px; text-align: right;
      }

      /* Track list */
      #suno-track-list {
        display: flex; flex-direction: column; gap: 2px;
        flex: 1; min-height: 80px;
        max-height: 320px; overflow-y: auto; overflow-x: hidden;
        scrollbar-width: thin; scrollbar-color: var(--line) transparent;
        margin-top: 4px;
      }
      .suno-track-row {
        display: flex; align-items: center; gap: 6px;
        padding: 4px 8px; border-radius: 5px;
        background: var(--card); border: 1px solid var(--line);
        cursor: pointer; transition: border-color 100ms;
        min-width: 0;
      }
      .suno-track-row:hover          { border-color: var(--amber); }
      .suno-track-row.suno-track-active {
        border-color: var(--copper);
        background: color-mix(in oklch, var(--copper) 7%, transparent);
        box-shadow:
          0 0 6px  color-mix(in oklch, var(--copper) 30%, transparent),
          0 0 14px color-mix(in oklch, var(--copper) 14%, transparent);
      }
      .suno-track-play-indicator {
        font-size: 9px; color: var(--copper); flex-shrink: 0; width: 10px;
        text-align: center;
      }
      .suno-track-info { min-width: 0; flex: 1; display: flex; flex-direction: column; gap: 1px; }
      .suno-track-title {
        font-size: 11px; font-weight: 600; color: var(--ink);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .suno-track-artist { font-size: 9px; color: var(--faint); }
      .suno-track-dur {
        font-family: var(--font-mono); font-size: 10px; color: var(--dim);
        flex-shrink: 0;
      }

      /* Shared offline state */
      .offline-state {
        font-size: 12px; color: var(--faint); font-style: italic; padding: 10px 0;
      }
      .offline-state::before { content: '⬡ '; color: var(--amber); font-style: normal; }

      /* ── F4 Music player: source switcher ───────────────────────────── */
      .music-source-switcher {
        display: flex; gap: 6px; padding-bottom: 8px;
        border-bottom: 1px solid var(--line);
      }
      .music-src-btn {
        flex: 1; font-size: 11px; padding: 4px 8px;
        border-radius: 6px; cursor: pointer;
      }
      .music-src-btn.active {
        background: color-mix(in oklch, var(--copper) 18%, transparent);
        border-color: var(--copper); color: var(--copper);
      }

      /* ── F4 Music player: repeat button ─────────────────────────────── */
      #music-btn-repeat { font-size: 12px; min-width: 60px; }

      /* ── F4 Music player: folder browser ────────────────────────────── */
      .music-browser-area {
        display: flex; flex-direction: column; gap: 2px;
        max-height: 240px; overflow-y: auto;
      }
      .music-browser-section-label {
        font-size: 10px; color: var(--faint); font-variant-caps: small-caps;
        letter-spacing: 0.06em; padding: 4px 0 2px; text-transform: uppercase;
      }
      .music-browser-back {
        background: none; border: none; color: var(--copper); cursor: pointer;
        font-size: 11px; padding: 2px 0 4px; text-align: left;
      }
      .music-browser-back:hover { color: var(--amber); }
      .music-browser-entry {
        display: flex; align-items: center; gap: 6px;
        padding: 4px 6px; border-radius: 5px; cursor: pointer;
        border: 1px solid transparent;
        transition: background 80ms, border-color 80ms;
      }
      .music-browser-entry:hover {
        background: color-mix(in oklch, var(--amber) 7%, transparent);
        border-color: color-mix(in oklch, var(--amber) 30%, transparent);
      }
      .music-browser-icon { font-size: 13px; flex-shrink: 0; }
      .music-browser-name { font-size: 11px; color: var(--ink); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .music-browser-use {
        background: color-mix(in oklch, var(--copper) 12%, transparent);
        border: 1px solid var(--copper); color: var(--copper);
        border-radius: 4px; font-size: 10px; padding: 2px 6px; cursor: pointer;
        flex-shrink: 0; white-space: nowrap;
      }
      .music-browser-use:hover { background: color-mix(in oklch, var(--amber) 18%, transparent); border-color: var(--amber); color: var(--amber); }
      .music-browser-empty { font-size: 11px; color: var(--faint); padding: 8px 4px; line-height: 1.5; }
      .music-browser-loading { font-size: 11px; color: var(--faint); padding: 8px 4px; }

      /* ── F4 Music player: queue track rows ──────────────────────────── */
      .music-track-row {
        display: flex; align-items: center; gap: 6px;
        padding: 4px 6px; border-radius: 5px; cursor: pointer;
        border: 1px solid transparent; min-height: 28px;
        transition: background 80ms, border-color 80ms;
      }
      .music-track-row:hover { background: color-mix(in oklch, var(--amber) 7%, transparent); border-color: color-mix(in oklch, var(--amber) 30%, transparent); }
      .music-track-active { border-color: color-mix(in oklch, var(--copper) 55%, transparent) !important; }
      .music-track-indicator { font-size: 9px; color: var(--copper); width: 10px; text-align: center; flex-shrink: 0; }
      .music-track-info { min-width: 0; flex: 1; display: flex; flex-direction: column; gap: 1px; }
      .music-track-title { font-size: 11px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .music-track-artist { font-size: 9px; color: var(--faint); }
      .music-track-dur { font-family: var(--font-mono); font-size: 10px; color: var(--dim); flex-shrink: 0; }

      /* ── F4: change-folder button ────────────────────────────────────── */
      .music-change-folder-btn { font-size: 10px; margin-bottom: 6px; width: 100%; }

      /* ── F4.4: fx-glow on the active track (copper hue) ─────────────── */
      .music-track-active.fx-glow {
        box-shadow:
          0 0 6px  color-mix(in oklch, var(--copper) 35%, transparent),
          0 0 16px color-mix(in oklch, var(--copper) 18%, transparent);
        border-color: color-mix(in oklch, var(--copper) 55%, transparent) !important;
      }

      /* ── Footer ─────────────────────────────────────────────────────── */
      #footer {
        height: 28px;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        border-top: 1px solid var(--line); flex-shrink: 0;
        background: var(--footer-bg);
      }
      .footer-hex {
        font-family: var(--font-mono); color: color-mix(in oklch, var(--faint) 50%, transparent);
        font-size: 13px; letter-spacing: 2px; user-select: none;
      }
      .footer-text {
        font-size: 9px; font-weight: 500; letter-spacing: 0.10em;
        color: var(--faint); opacity: 0.6;
      }

      #probe-panel { gap: 10px; }
      .probe-btn {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        padding: 16px 20px; border-radius: 8px;
        background: var(--card); border: 2px solid var(--amber);
        color: var(--amber); font-family: var(--font-ui); font-size: 14px;
        font-weight: 700; cursor: pointer; user-select: none; flex-shrink: 0;
        transition: background 120ms, box-shadow 120ms;
      }
      .probe-btn:hover {
        background: color-mix(in oklch, var(--amber) 8%, transparent);

      .probe-counter {

      .probe-counter-label {

        --bg: oklch(0.151 0.009 18.2); --bg2: oklch(0.178 0.023 19.5); --card: oklch(0.22 0.033 20.1); --line: oklch(0.531 0.218 29.2);
        --ink: oklch(1 0 0); --dim: oklch(0.757 0 0); --faint: oklch(0.531 0.218 29.2);
        --copper: oklch(0.646 0.241 32.6); --amber: oklch(0.698 0.197 38); --amber-glow: oklch(0.698 0.197 38);
        --green: oklch(0.704 0.187 23.2); --red: oklch(0.66 0.17 25); --cyan: oklch(0.628 0.258 29.2); --violet: var(--cyan);
        --hex-bg: #0f0a0a; --hex-bg2: #1a0d0d; --hex-card: #281414; --hex-line: #cc0000;
        --hex-ink: #ffffff; --hex-dim: #b0b0b0; --hex-faint: #cc0000;
        --hex-copper: #ff3300; --hex-amber: #ff6633; --hex-green: #ff6666; --hex-red: #e8605b; --hex-cyan: #ff0000;
        --panel: oklch(0.178 0.023 19.5); --topbar-bg: oklch(0.151 0.009 18.2 / 0.92); --overlay-bg: oklch(0.151 0.009 18.2 / 0.6);
        --viz-bg: oklch(0.178 0.023 19.5); --cell-bg-top: oklch(0.22 0.033 20.1); --cell-bg-bot: oklch(0.178 0.023 19.5);
        --cell-hi-top: oklch(0.531 0.218 29.2 / 0.18); --cell-shadow: oklch(0.04 0.01 0 / 0.5);
        --cell-border-hov: oklch(0.646 0.241 32.6 / 0.55); --scrollbar-thumb: oklch(0.531 0.218 29.2); --track-bg: oklch(0.22 0.033 20.1);
        --footer-bg: oklch(0.151 0.009 18.2 / 0.5); --suspended-veil: oklch(0.151 0.009 18.2 / 0.78); --header-sep: oklch(0.531 0.218 29.2);
      }
      html[data-theme="code-red"] {
        --fx-rain: #ff0000; --fx-rain-2: #ff0000;
        --fx-snow: #ff0000; --fx-snow-2: #ff0000;
        --fx-snow-glow: #aa0000; --fx-snow-glow-2: #aa0000;
        --fx-style: matrix;
      }
      /* GEN:DASHBOARD-FX END */

      /* ── Per-theme fonts (#204) ──────────────────────────────────────────
         Each theme gets a display (--font-ui) and, where it matters, a mono
         (--font-mono) face that fits its identity. Robust fallbacks keep text
         readable if a web font fails. Hand-authored OUTSIDE the GEN markers so
         theme regeneration never clobbers it. Themes not listed keep the :root
         defaults (Inter / JetBrains Mono) — chosen for legibility (e.g.
         weatherstar stays on Inter so the readability fix in #201 holds). */
      html[data-theme="holo"],
      html[data-theme="vector-tron"],
      html[data-theme="synthwave"],
      html[data-theme="retro-purple"] {
        --font-ui: 'Orbitron', 'Inter', system-ui, sans-serif;
        --font-mono: 'Share Tech Mono', 'JetBrains Mono', ui-monospace, monospace;
      }
      html[data-theme="terminal"],
      html[data-theme="code-fall"],
      html[data-theme="code-red"] {
        --font-ui: 'Share Tech Mono', 'JetBrains Mono', ui-monospace, monospace;
        --font-mono: 'Share Tech Mono', 'JetBrains Mono', ui-monospace, monospace;
      }
      html[data-theme="brutalist"],
      html[data-theme="nod"] {
        --font-ui: 'Oswald', 'Inter', system-ui, sans-serif;
      }
      html[data-theme="nod"] {
        --font-mono: 'Share Tech Mono', 'JetBrains Mono', ui-monospace, monospace;
      }
      html[data-theme="royal"] {
        --font-ui: 'Cinzel', Georgia, 'Times New Roman', serif;
      }
      html[data-theme="glitch-mag"],
      html[data-theme="zombie"] {
        --font-ui: 'Special Elite', 'Courier New', monospace;
      }
      html[data-theme="zombie"] {
        --font-mono: 'Special Elite', 'Courier New', monospace;
      }
    </style>
  </head>
  <body>
    <div id="app">

      <!-- ── Topbar (F2: grouped, responsive, overflow menu) ─────────────── -->
      <header id="topbar" class="fx-glass">

        <!-- ── Brand ───────────────────────────────────────────────────── -->
        <div class="tb-group tb-brand">
          <span class="logo-mark" aria-label="Hive dashboard">hive</span>
        </div>

        <!-- ── Health pill (F2.1: merges live-dot+live-label+pulse+esc+cost) ── -->
        <div class="tb-group tb-health">
          <div class="topbar-health-pill" id="topbar-health-pill" aria-live="polite" aria-label="System status">
            <div class="live-dot" id="live-dot"></div>
            <span id="topbar-pulse" class="topbar-pulse">&#x2014;</span>
          </div>
          <span class="topbar-esc-badge" id="topbar-esc-badge" aria-label="Escalations"></span>
          <span class="topbar-cost" id="topbar-cost" title="Session spend">--</span>
          <span class="board-state-chip" id="board-state-chip" style="display:none">loading&#x2026;</span>
        </div>

        <!-- ── View group: mode / presets / modules / board-switcher ─────── -->
        <div class="tb-group tb-view" role="group" aria-label="View controls">
          <button id="act-presets" class="act-btn" title="Layout, modules, monitor &amp; saved arrangements" aria-label="Layout menu">&#x229E; Layout</button>
          <!-- #211: the standalone "Modules" button folded into the Layout menu. -->
          <!-- DL4: lock button — hidden unless desktop mode is active -->
          <button id="act-lock" class="act-btn act-desktop-only" title="Lock / unlock panel positions" aria-label="Lock or unlock panel positions" style="display:none">&#x1F513; Unlock</button>
          <div id="topbar-board-switcher" class="topbar-board-switcher"></div>
        </div>

        <!-- ── Mutate group: pause / task / goal / board ──────────────── -->
        <div id="topbar-actions" class="tb-group tb-mutate topbar-actions" role="group" aria-label="Board actions">
          <button id="act-pause"   class="act-btn act-mutate" title="Pause or resume the dispatcher" aria-label="Pause or resume dispatcher">&#x23F8; Pause</button>
          <button id="act-task"    class="act-btn act-mutate" title="Create a new task" aria-label="New task">&#xFF0B; Task</button>
          <button id="act-goal"    class="act-btn act-mutate" title="Decompose a goal into tasks" aria-label="Decompose goal">&#x2726; Goal</button>
          <button id="act-board"   class="act-btn" title="Open the crew board web page" aria-label="Open crew board">&#x229E; Board</button>
        </div>

        <div class="topbar-spacer"></div>

        <!-- ── Suno mini-player ───────────────────────────────────────── -->
        <div id="topbar-suno" class="topbar-suno" aria-label="Music player">
          <button id="suno-btn-prev" class="suno-mini-btn" aria-label="Previous track">&#x23EE;</button>
          <button id="suno-btn-play" class="suno-mini-btn suno-mini-play" aria-label="Play or pause">&#x25B6;</button>
          <button id="suno-btn-next" class="suno-mini-btn" aria-label="Next track">&#x23ED;</button>
          <span id="suno-mini-title" class="suno-mini-title" title="">No track</span>
          <button id="suno-dd-toggle" class="suno-mini-btn suno-dd-toggle" aria-label="Browse songs" aria-expanded="false">&#x25BE;</button>
        </div>

        <!-- Low-frequency controls, INLINE (the ⋯ More menu was removed). -->
        <div class="tb-group tb-fx">
          <button id="act-theme"   class="act-btn" title="Cycle theme" aria-label="Cycle theme">&#x25D1; Theme</button>
          <button id="act-rain"    class="act-btn act-fx" title="Toggle rain effect" aria-label="Toggle rain">&#x1F327;</button>
          <button id="act-snow"    class="act-btn act-fx" title="Toggle snow effect" aria-label="Toggle snow">&#x2744;</button>
          <button id="act-palette" class="act-btn act-btn-icon" title="Command palette (Ctrl+K)" aria-label="Command palette">&#x2318;</button>
        </div>

        <span class="paused-badge" id="paused-badge" aria-live="polite">Paused</span>
      </header>

      <!-- ── Player dropdown: Suno + Local sources (hidden until toggled) ── -->
      <div id="suno-dropdown" class="suno-dropdown fx-glass" hidden>

        <!-- Source switcher (F4.2) -->
        <div class="music-source-switcher" role="group" aria-label="Music source">
          <button id="music-src-suno"  class="suno-btn music-src-btn active" aria-label="Suno source">&#x1F3B5; Suno</button>
          <button id="music-src-local" class="suno-btn music-src-btn" aria-label="Local folder source">&#x1F4C2; Local</button>
        </div>

        <!-- Now-playing (shared between both sources) -->
        <div class="suno-dd-now">
          <img id="suno-art" class="suno-art" src="" alt="" />
          <div class="suno-dd-now-info">
            <div id="suno-now-title"  class="suno-title">No tracks</div>
            <div id="suno-now-artist" class="suno-artist"></div>
            <div class="suno-dd-scrub">
              <span id="suno-elapsed"   class="suno-elapsed">0:00</span>
              <input id="suno-scrub"    class="suno-scrub" type="range" min="0" max="1000" value="0" />
              <span id="suno-remaining" class="suno-remaining">--:--</span>
            </div>
          </div>
          <span id="suno-duration" class="suno-duration">--:--</span>
        </div>

        <!-- Visualizer canvas (shared — reacts to same <audio> for both sources) -->
        <canvas id="suno-viz" class="suno-viz" width="360" height="44"></canvas>

        <!-- Transport controls (shared) -->
        <div class="suno-dd-controls">
          <button id="suno-btn-shuffle" class="suno-btn" aria-label="Shuffle" aria-pressed="false">&#x21CC; shuffle</button>
          <button id="music-btn-repeat" class="suno-btn" aria-label="Repeat off">&#x27F3; off</button>
          <div class="suno-vol-wrap">
            <label class="suno-vol-label">vol</label>
            <input id="suno-volume" class="suno-volume" type="range" min="0" max="100" value="80" />
          </div>
        </div>

        <!-- Suno section (track list + search) -->
        <div id="suno-suno-section">
          <div class="suno-list-header">
            <input id="suno-search" class="suno-search" type="search" placeholder="filter tracks…" autocomplete="off" spellcheck="false" />
            <span id="suno-count" class="suno-count">0</span>
          </div>
          <div id="suno-track-list" class="suno-track-list"></div>
        </div>

        <!-- Local section (folder browser / queue) (F4.2–F4.3) -->
        <div id="music-local-section" hidden>
          <div class="suno-list-header">
            <input id="music-search" class="suno-search" type="search" placeholder="filter tracks…" autocomplete="off" spellcheck="false" />
            <span id="music-count" class="suno-count">0</span>
          </div>
          <!-- Folder browser or queue is rendered into this area by music.ts -->
          <div id="music-browser-area" class="suno-track-list music-browser-area"></div>
        </div>

      </div>

      <!-- ── Command palette (Ctrl+K) ───────────────────────────────── -->
      <div id="cmd-palette" class="cmd-overlay" hidden>
        <div class="cmd-box">
          <input id="cmd-input" class="cmd-input" type="text" placeholder="Type a command…" autocomplete="off" spellcheck="false" />
          <div id="cmd-results" class="cmd-results"></div>
        </div>
      </div>

      <!-- ── Generic action modal (New Task / Goal) ─────────────────── -->
      <div id="cmd-modal" class="cmd-overlay" hidden>
        <div class="cmd-box cmd-modal-box">
          <div id="cmd-modal-title" class="cmd-modal-title">New task</div>
          <input id="cmd-modal-text" class="cmd-input" type="text" placeholder="" autocomplete="off" />
          <select id="cmd-modal-project" class="cmd-select"></select>
          <div class="cmd-modal-actions">
            <button id="cmd-modal-cancel" class="act-btn">Cancel</button>
            <button id="cmd-modal-submit" class="act-btn act-btn-primary">Create</button>
          </div>
          <div id="cmd-modal-msg" class="cmd-modal-msg"></div>
        </div>
      </div>

      <!-- ── Panels manager (CC6) ───────────────────────────────────── -->
      <div id="panels-modal" class="cmd-overlay" hidden>
        <div class="cmd-box cmd-modal-box">
          <div class="panels-head">
            <span class="cmd-modal-title">Panels</span>
            <button id="panels-modal-close" class="act-btn">✕</button>
          </div>
          <div id="panels-list" class="panels-list"></div>
          <div class="cmd-modal-msg">Toggles persist. Disabled panels never seat.</div>
        </div>
      </div>

      <!-- v2 dynamic layout grid (plugins mount here as absolute cells) -->
      <div id="dashboard-grid"></div>

      <!-- ── Main three-column grid ─────────────────────────────────── -->

      <!-- Footer removed: grid now fills full remaining height -->
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
