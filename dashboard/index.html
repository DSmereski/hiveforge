<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=5120, initial-scale=1.0" />
    <title>Hive Command Center</title>

    <!-- Material Icons for the honeycomb glyph -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <!-- Inter + JetBrains Mono -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Reset ──────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Design tokens (OKLCH warm-black / copper / amber per DESIGN.md) */
      :root {
        --bg:        oklch(0.14 0.014 55);
        --bg2:       oklch(0.17 0.016 58);
        --card:      oklch(0.20 0.018 60);
        --line:      oklch(0.30 0.02  64);
        --ink:       oklch(0.95 0.012 72);
        --dim:       oklch(0.74 0.014 72);
        --faint:     oklch(0.63 0.015 68);
        --copper:    oklch(0.74 0.13  56);
        --amber:     oklch(0.83 0.15  78);
        --amber-glow:oklch(0.85 0.17  80);
        --green:     oklch(0.80 0.16 150);
        --red:       oklch(0.66 0.17  25);
        --cyan:      oklch(0.80 0.10 200);
        /* Claude = cyan per the canon (telemetry/system data). The earlier
           --violet was off-canon; aliased to cyan so any stragglers stay
           on-brand. */
        --violet:    var(--cyan);

        /* Hex for canvas */
        --hex-bg:     #121610;
        --hex-bg2:    #161a13;
        --hex-card:   #1c201a;
        --hex-line:   #363c30;
        --hex-ink:    #f2f0ec;
        --hex-dim:    #b8b4a8;
        --hex-faint:  #9c9890;
        --hex-copper: #c07840;
        --hex-amber:  #e0a030;
        --hex-green:  #5cc870;
        --hex-red:    #c44040;
        --hex-cyan:   #60c8c8;

        /* Layout */
        --topbar-h: 56px;
        --font-ui:  'Inter', system-ui, sans-serif;
        --font-mono:'JetBrains Mono', ui-monospace, monospace;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        background-image: radial-gradient(
          120% 80% at 50% -10%,
          oklch(0.17 0.03 60),
          oklch(0.10 0.01 55)
        );
        color: var(--ink);
        font-family: var(--font-ui);
        font-size: 14px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
      }

      /* it12 — keyboard a11y: a consistent amber focus ring on every
         interactive element (buttons, rows, tiles, palette, track list). */
      :focus-visible {
        outline: 2px solid var(--amber);
        outline-offset: 2px;
        border-radius: 4px;
      }
      button:focus-visible, .act-btn:focus-visible, .cmd-row:focus-visible,
      .kpi-tile:focus-visible, .needs-row:focus-visible, .panel-header:focus-visible {
        outline: 2px solid var(--amber); outline-offset: 1px;
      }

      /* ── Ambient glow layer (sexy depth, GPU-cheap) ─────────────────── */
      body::before {
        content: '';
        position: fixed; inset: -20%;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(38% 30% at 22% 18%, oklch(0.74 0.13 56 / 0.10), transparent 70%),
          radial-gradient(42% 34% at 82% 78%, oklch(0.83 0.15 78 / 0.07), transparent 72%),
          radial-gradient(30% 26% at 60% 50%, oklch(0.80 0.10 200 / 0.05), transparent 75%);
        animation: ambientDrift 38s ease-in-out infinite alternate;
      }
      @keyframes ambientDrift {
        0%   { transform: translate3d(0,0,0) scale(1);     opacity: 0.85; }
        50%  { transform: translate3d(1.5%, -1.2%, 0) scale(1.06); opacity: 1; }
        100% { transform: translate3d(-1.2%, 1.4%, 0) scale(1.03); opacity: 0.9; }
      }
      @media (prefers-reduced-motion: reduce) { body::before { animation: none; } }

      /* ── Root layout ────────────────────────────────────────────────── */
      #app {
        position: relative;
        z-index: 1;       /* above the ambient glow layer */
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Topbar ─────────────────────────────────────────────────────── */
      #topbar {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 20px;
        height: var(--topbar-h);
        flex-shrink: 0;
        border-bottom: 1px solid var(--line);
        background: oklch(0.15 0.016 57 / 0.92);
        backdrop-filter: blur(8px);
        z-index: 10;
      }

      /* Brand mark: the Material `hive_outlined` honeycomb glyph (amber),
         per DESIGN.md. Rendered as a Material Icons Outlined ligature so it
         matches the Flutter app's hex/honeycomb anchor. */
      .logo-mark {
        font-family: 'Material Icons Outlined';
        font-size: 22px;
        color: var(--amber);
        text-shadow: 0 0 12px oklch(0.85 0.17 80 / 0.6);
        line-height: 1;
        user-select: none;
        flex-shrink: 0;
        -webkit-font-feature-settings: 'liga';
        font-feature-settings: 'liga';
      }

      .topbar-title {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink);
        flex-shrink: 0;
      }

      .live-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        flex-shrink: 0;
        animation: pulse-dot 1.6s ease-in-out infinite;
      }
      .live-dot.offline { background: var(--red); animation: none; }

      @keyframes pulse-dot {
        0%, 100% { opacity: 0.5; transform: scale(0.9); }
        50%       { opacity: 1;   transform: scale(1.15); }
      }

      .live-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--green);
        letter-spacing: 0.06em;
        flex-shrink: 0;
      }
      .live-label.offline { color: var(--red); }

      .board-state-chip {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--dim);
        padding: 2px 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--card);
        flex-shrink: 0;
      }
      .board-state-chip.running { color: var(--green); border-color: var(--green); }
      .board-state-chip.paused  { color: var(--amber); border-color: var(--amber); }

      /* Full-board expand / back buttons + iframe embed */
      .board-expand-btn, .board-full-back {
        font-family: inherit; font-size: 10px; font-weight: 600;
        letter-spacing: 0.04em; color: var(--dim);
        background: var(--card); border: 1px solid var(--line);
        border-radius: 6px; padding: 2px 8px; cursor: pointer;
        transition: color 100ms, border-color 100ms; flex-shrink: 0;
      }
      .board-expand-btn:hover, .board-full-back:hover {
        color: var(--amber); border-color: var(--amber);
      }
      .board-full-frame-wrap {
        flex: 1; min-height: 0;
        border: 1px solid var(--line); border-radius: 8px;
        overflow: hidden; background: var(--bg);
      }
      .board-full-frame {
        width: 100%; height: 100%; border: 0; display: block;
        background: transparent;
      }

      .topbar-clock {
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 500;
        color: var(--dim);
        letter-spacing: 0.05em;
        font-variant-numeric: tabular-nums;
        flex-shrink: 0;
      }

      .topbar-esc-badge {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.10em;
        color: var(--faint);
        flex-shrink: 0;
      }
      .topbar-esc-badge.active { color: var(--red); }

      .topbar-cost {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
        color: var(--cyan);
        font-variant-numeric: tabular-nums;
        flex-shrink: 0;
      }

      .topbar-sep {
        width: 1px;
        height: 18px;
        background: var(--line);
        flex-shrink: 0;
      }

      .topbar-spacer { flex: 1; }

      /* ── Suno mini-player (top bar) ──────────────────────────────────── */
      .topbar-suno {
        display: flex; align-items: center; gap: 6px;
        height: 32px; padding: 0 4px 0 8px;
        border: 1px solid var(--line); border-radius: 999px;
        background: var(--card);
      }
      .suno-mini-btn {
        display: inline-flex; align-items: center; justify-content: center;
        width: 24px; height: 24px; padding: 0;
        font-size: 12px; line-height: 1; color: var(--dim);
        background: transparent; border: 0; border-radius: 50%;
        cursor: pointer; transition: color 100ms, background 100ms;
      }
      .suno-mini-btn:hover { color: var(--amber); background: oklch(0.83 0.15 78 / 0.12); }
      .suno-mini-play { color: var(--amber); font-size: 13px; }
      .suno-mini-title {
        max-width: 200px; overflow: hidden; text-overflow: ellipsis;
        white-space: nowrap; font-size: 11px; color: var(--ink);
        font-variant-numeric: tabular-nums;
      }
      .suno-dd-toggle { font-size: 10px; }
      .suno-dd-toggle[aria-expanded="true"] { color: var(--amber); transform: rotate(180deg); }

      /* ── Suno dropdown (song navigator) ──────────────────────────────── */
      .suno-dropdown {
        position: fixed; top: calc(var(--topbar-h) - 4px); right: 16px;
        width: 380px; max-height: 70vh; z-index: 50;
        display: flex; flex-direction: column; gap: 8px;
        padding: 12px; border: 1px solid var(--line); border-radius: 12px;
        background: var(--panel);
        box-shadow: 0 14px 40px oklch(0.08 0.01 55 / 0.6);
        animation: sunoDdIn 160ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .suno-dropdown[hidden] { display: none; }
      @keyframes sunoDdIn {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) { .suno-dropdown { animation: none; } }
      .suno-dd-now { display: flex; gap: 10px; align-items: flex-start; }
      .suno-dd-now-info { flex: 1; min-width: 0; }
      .suno-dd-scrub { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
      .suno-dd-controls {
        display: flex; align-items: center; justify-content: space-between;
        gap: 10px; padding-bottom: 4px; border-bottom: 1px solid var(--line);
      }
      .suno-viz {
        width: 100%; height: 40px; display: block;
        border-radius: 6px; background: oklch(0.12 0.012 58);
        border: 1px solid var(--line);
      }

      /* ── Command surface (CC1) ───────────────────────────────────────── */
      .topbar-actions { display: flex; align-items: center; gap: 6px; margin-left: 12px; }
      .act-btn {
        font-family: inherit; font-size: 11px; font-weight: 600;
        letter-spacing: 0.03em; color: var(--dim);
        background: var(--card); border: 1px solid var(--line); border-radius: 7px;
        padding: 4px 10px; cursor: pointer; white-space: nowrap;
        transition: color 100ms, border-color 100ms, background 100ms;
      }
      .act-btn:hover { color: var(--amber); border-color: var(--amber); }
      .act-btn-icon { padding: 4px 9px; font-size: 12px; }
      .act-btn-primary { color: var(--on-amber, #1A0E00); background: var(--amber); border-color: var(--amber); }
      .act-btn-primary:hover { filter: brightness(1.08); color: var(--on-amber, #1A0E00); }
      #act-pause.is-paused { color: var(--amber); border-color: var(--amber); }

      .cmd-overlay {
        position: fixed; inset: 0; z-index: 100;
        display: flex; align-items: flex-start; justify-content: center;
        padding-top: 14vh; background: oklch(0.08 0.01 55 / 0.55);
      }
      .cmd-overlay[hidden] { display: none; }
      .cmd-box {
        width: 540px; max-width: 92vw;
        display: flex; flex-direction: column; gap: 8px;
        padding: 12px; border: 1px solid var(--line); border-radius: 12px;
        background: var(--panel); box-shadow: 0 18px 50px oklch(0.08 0.01 55 / 0.7);
        animation: sunoDdIn 150ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .cmd-input {
        font-family: inherit; font-size: 14px; color: var(--ink);
        background: var(--card); border: 1px solid var(--line); border-radius: 8px;
        padding: 9px 12px; outline: none;
      }
      .cmd-input:focus { border-color: var(--amber); }
      .cmd-select {
        font-family: inherit; font-size: 12px; color: var(--ink);
        background: var(--card); border: 1px solid var(--line); border-radius: 8px;
        padding: 7px 10px; outline: none;
      }
      .cmd-results { display: flex; flex-direction: column; gap: 2px; max-height: 50vh; overflow-y: auto; }
      .cmd-row {
        display: flex; align-items: center; gap: 8px;
        padding: 7px 10px; border-radius: 7px; cursor: pointer;
        font-size: 13px; color: var(--ink);
      }
      .cmd-row.sel, .cmd-row:hover { background: var(--card-hi, var(--card)); color: var(--amber); }
      .cmd-row .cmd-hint { margin-left: auto; font-size: 10px; color: var(--faint); }
      .cmd-modal-box { width: 460px; }
      .cmd-modal-title { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--amber); }
      .cmd-modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 2px; }
      .cmd-modal-msg { font-size: 11px; color: var(--faint); min-height: 14px; }

      /* ── Panels manager (CC6) ────────────────────────────────────────── */
      .panels-head { display: flex; align-items: center; justify-content: space-between; }
      .panels-list { display: flex; flex-direction: column; gap: 2px; max-height: 55vh; overflow-y: auto; }
      .panels-row { display: flex; align-items: center; gap: 9px; padding: 6px 8px; border-radius: 7px; cursor: pointer; }
      .panels-row:hover { background: var(--card); }
      .panels-toggle { accent-color: var(--amber); width: 15px; height: 15px; cursor: pointer; }
      .panels-name { font-size: 13px; color: var(--ink); }
      .panels-id { margin-left: auto; font-size: 10px; font-family: var(--font-mono); color: var(--faint); }

      /* ── System / Services panel (CC4) ───────────────────────────────── */
      .sys-body { padding: 8px 10px; overflow-y: auto; height: calc(100% - 40px); display: flex; flex-direction: column; gap: 10px; }
      .svc-dots { display: flex; flex-direction: column; gap: 3px; }
      .svc-dot-row { display: flex; align-items: center; gap: 7px; font-size: 11px; }
      .svc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .svc-up   { background: var(--green, oklch(0.80 0.16 150)); box-shadow: 0 0 6px var(--green, oklch(0.80 0.16 150)); }
      .svc-down { background: var(--red, oklch(0.66 0.17 25)); box-shadow: 0 0 6px var(--red, oklch(0.66 0.17 25)); }
      .svc-name { color: var(--ink); }
      .svc-uptime { margin-left: auto; font-size: 10px; font-family: var(--font-mono); color: var(--faint); }
      .sys-bars { display: flex; flex-direction: column; gap: 4px; }
      .sys-metric { display: flex; align-items: center; gap: 7px; }
      .sys-metric-lbl { font-size: 9px; color: var(--faint); width: 30px; text-transform: uppercase; letter-spacing: 0.04em; }
      .sys-metric .gpu-bar-track { flex: 1; margin: 0; }
      .sys-metric-val { font-size: 10px; font-family: var(--font-mono); color: var(--dim); width: 58px; text-align: right; }

      /* ── Content Gallery (image/video requests) ──────────────────────── */
      .cg-count { font-size: 10px; font-family: var(--font-mono); color: var(--faint); }
      .cg-grid {
        padding: 8px; overflow-y: auto; height: calc(100% - 40px);
        display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
        gap: 8px; align-content: start;
      }
      .cg-item { display: flex; flex-direction: column; gap: 3px; }
      .cg-thumbs { display: flex; gap: 3px; }
      .cg-thumb {
        width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 7px;
        border: 1px solid var(--line); cursor: zoom-in; background: var(--card);
        transition: border-color 120ms, transform 160ms cubic-bezier(0.16,1,0.3,1);
      }
      .cg-thumb:hover { border-color: var(--amber); transform: scale(1.03); }
      .cg-pending {
        width: 100%; aspect-ratio: 1; border-radius: 7px;
        border: 1px dashed var(--line); display: flex; align-items: center; justify-content: center;
        font-size: 10px; font-family: var(--font-mono); color: var(--amber);
        background: oklch(0.83 0.15 78 / 0.05); text-align: center;
      }
      .cg-pending.cg-failed { color: var(--red, oklch(0.66 0.17 25)); border-color: oklch(0.66 0.17 25 / 0.4); }
      .cg-meta { display: flex; align-items: baseline; gap: 5px; min-width: 0; }
      .cg-type { font-size: 10px; color: var(--amber); flex-shrink: 0; }
      .cg-prompt { font-size: 10px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .cg-lightbox {
        position: fixed; inset: 0; z-index: 120; cursor: zoom-out;
        display: flex; align-items: center; justify-content: center;
        background: oklch(0.06 0.01 55 / 0.85); padding: 4vh;
      }
      .cg-lightbox[hidden] { display: none; }
      .cg-lightbox img {
        max-width: 92vw; max-height: 92vh; border-radius: 10px;
        border: 1px solid var(--line); box-shadow: 0 20px 60px oklch(0.05 0.01 55 / 0.7);
      }

      /* ── Git activity (it10) ─────────────────────────────────────────── */
      .git-count { font-size: 10px; font-family: var(--font-mono); color: var(--faint); }
      .git-list { padding: 5px 7px; overflow-y: auto; height: calc(100% - 40px); display: flex; flex-direction: column; gap: 2px; }
      .git-row { display: flex; align-items: baseline; gap: 8px; padding: 4px 6px; border-radius: 6px; }
      .git-row:hover { background: oklch(0.80 0.16 150 / 0.06); }
      .git-hash { font-family: var(--font-mono); font-size: 10px; color: var(--green, oklch(0.80 0.16 150)); flex-shrink: 0; }
      .git-info { display: flex; flex-direction: column; min-width: 0; }
      .git-subject { font-size: 11px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .git-sub { font-size: 9px; color: var(--faint); }

      /* ── Docker panel (CC4 add-on) ───────────────────────────────────── */
      .dk-count { font-size: 10px; font-family: var(--font-mono); color: var(--faint); }
      .dk-body { padding: 6px 8px; overflow-y: auto; height: calc(100% - 40px); display: flex; flex-direction: column; gap: 3px; }
      .dk-row { display: flex; align-items: center; gap: 7px; padding: 4px 6px; border-radius: 6px; background: var(--card); border: 1px solid var(--line); }
      .dk-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .dk-up   { background: var(--green, oklch(0.80 0.16 150)); box-shadow: 0 0 6px var(--green, oklch(0.80 0.16 150)); }
      .dk-down { background: var(--faint); }
      .dk-warn { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
      .dk-bad  { background: var(--red, oklch(0.66 0.17 25)); box-shadow: 0 0 6px var(--red, oklch(0.66 0.17 25)); }
      .dk-info { display: flex; flex-direction: column; min-width: 0; flex: 1; }
      .dk-name { font-size: 11px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .dk-sub { font-size: 9px; color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .dk-status { font-size: 9px; font-family: var(--font-mono); color: var(--dim); flex-shrink: 0; }

      /* ── Crew-board hero enrich (it7) ────────────────────────────────── */
      .hero-grid { display: flex; align-items: center; gap: 14px; }
      .hero-ring { width: 52px; height: 52px; flex-shrink: 0; transform: rotate(-90deg); }
      .hero-ring-bg { fill: none; stroke: var(--line); stroke-width: 4; }
      .hero-ring-fg {
        fill: none; stroke: var(--amber); stroke-width: 4; stroke-linecap: round;
        filter: drop-shadow(0 0 4px oklch(0.83 0.15 78 / 0.5));
        transition: stroke-dashoffset 0.6s cubic-bezier(0.16,1,0.3,1);
      }
      .hero-ring-txt {
        fill: var(--amber); font-family: var(--font-mono); font-size: 12px; font-weight: 700;
        transform: rotate(90deg); transform-origin: 20px 20px;
      }
      .hero-main { flex: 1; min-width: 0; }
      .hero-now-doing {
        display: flex; align-items: center; gap: 6px; margin: 4px 0 6px;
        font-family: var(--font-mono); font-size: 11px; color: var(--cyan, oklch(0.80 0.10 200));
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .hero-now-dot {
        width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
        background: var(--cyan, oklch(0.80 0.10 200));
        box-shadow: 0 0 6px var(--cyan, oklch(0.80 0.10 200));
        animation: livepulse 1.6s ease-in-out infinite;
      }
      @media (prefers-reduced-motion: reduce) { .hero-now-dot { animation: none; } }
      .hero-tok {
        font-family: var(--font-mono); font-size: 10px; padding: 1px 6px; border-radius: 5px;
        border: 1px solid var(--line);
      }
      .hero-tok.tok-hive   { color: var(--green, oklch(0.80 0.16 150)); }
      .hero-tok.tok-claude { color: var(--cyan, oklch(0.80 0.10 200)); }

      /* ── Status hero zone (P1 — "bigger stat area") ──────────────────── */
      .hero {
        display: grid;
        grid-template-columns: minmax(150px, 0.9fr) minmax(0, 2.2fr) minmax(200px, 1.3fr);
        align-items: stretch; height: 100%; gap: 1px;
      }
      .hero > div { padding: 8px 14px; display: flex; flex-direction: column; min-width: 0; }
      .hero-pulse { justify-content: center; gap: 3px; border-right: 1px solid var(--line); }
      .hero-pulse-word {
        font-family: var(--font-mono); font-weight: 800; line-height: 1;
        font-size: clamp(20px, 3vh, 34px); letter-spacing: -0.01em;
      }
      .hero-pulse-sub { font-size: 11px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .hero-vitals { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
      .hero-vital {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 2px 7px; border: 1px solid var(--line); border-radius: 999px;
        font-size: 9.5px; font-family: var(--font-mono); color: var(--dim);
        text-transform: uppercase; letter-spacing: 0.04em;
      }
      .hero-vital.is-warn { border-color: oklch(0.66 0.17 25 / 0.5); color: var(--red); }
      .hero-vital-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

      .hero-lanes-wrap { justify-content: flex-start; gap: 4px; border-right: 1px solid var(--line); overflow-y: auto; }
      .hero-lane { display: flex; flex-direction: column; gap: 2px; padding: 3px 0; cursor: pointer; }
      .hero-lane:hover .hero-lane-name { color: var(--amber); }
      .hero-lane-top { display: flex; align-items: baseline; gap: 8px; }
      .hero-lane-name {
        font-size: 12px; font-weight: 600; color: var(--ink); flex: 1; min-width: 0;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 140ms ease;
      }
      .hero-lane-turns { font-family: var(--font-mono); font-size: 10px; color: var(--copper); flex-shrink: 0; }
      .hero-lane-stall { font-size: 9px; text-transform: uppercase; color: var(--red); letter-spacing: 0.06em; flex-shrink: 0; }
      .hero-lane-now {
        font-size: 10.5px; color: var(--dim);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .hero-lane-bar { height: 3px; border-radius: 2px; background: oklch(0.5 0.03 64 / 0.18); overflow: hidden; }
      .hero-lane-bar > span { display: block; height: 100%; background: var(--amber); border-radius: 2px; transition: width 600ms cubic-bezier(0.16,1,0.3,1); }
      .hero-lane.is-stalled .hero-lane-bar > span { background: var(--red); }
      .hero-lanes-empty, .hero-lanes-more { font-size: 11px; color: var(--faint); padding: 4px 0; }

      /* `.hero > .hero-head` (0,0,2,0) beats `.hero > div` (0,0,1,1) so grid wins over the flex default. */
      .hero > .hero-head { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; align-content: center; }
      .hero-head-tile { display: flex; flex-direction: column; gap: 1px; min-width: 0; cursor: pointer; }
      .hero-head-value {
        font-family: var(--font-mono); font-variant-numeric: tabular-nums;
        font-size: clamp(18px, 2.6vh, 30px); font-weight: 700; line-height: 1; letter-spacing: -0.02em;
      }
      .hero-head-label { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); }
      .hero-head-spark { width: 72px; height: 16px; opacity: 0.8; margin-top: 1px; }
      .kpi-pop .hero-head-value { animation: kpiNum 420ms cubic-bezier(0.16,1,0.3,1); }
      @keyframes kpiNum { 0% { transform: scale(1); } 36% { transform: scale(1.16); } 100% { transform: scale(1); } }
      @media (prefers-reduced-motion: reduce) { .kpi-pop .hero-head-value { animation: none; } }

      /* ── Connect chip — unconfigured panels (it3) ────────────────────── */
      .cfg-chip {
        display: flex; align-items: center; gap: 8px;
        margin: 8px; padding: 7px 11px;
        border: 1px dashed var(--line); border-radius: 8px;
        background: oklch(0.74 0.13 56 / 0.04);
        font-size: 11px; color: var(--dim); width: fit-content;
      }
      .cfg-dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: var(--faint); flex-shrink: 0;
      }
      .cfg-label { color: var(--ink); font-weight: 600; }
      .cfg-hint { color: var(--faint); font-size: 10px; }
      /* ── Terminal: multi-session tabs (P3) ───────────────────────────── */
      .term-header { gap: 8px; }
      .term-tabs {
        display: flex; align-items: center; gap: 4px;
        flex: 1; min-width: 0; overflow-x: auto;
      }
      .term-tabs::-webkit-scrollbar { height: 0; }
      .term-tab {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 3px 7px; border: 1px solid var(--line); border-radius: 6px;
        background: transparent; color: var(--dim);
        font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.02em;
        cursor: pointer; white-space: nowrap; transition: color 140ms ease, border-color 140ms ease, background 140ms ease;
      }
      .term-tab:hover { border-color: oklch(0.74 0.13 56 / 0.5); color: var(--ink); }
      .term-tab.is-active {
        border-color: var(--amber); color: var(--amber);
        background: oklch(0.74 0.13 56 / 0.08);
      }
      .term-tab-dot { font-size: 8px; line-height: 1; }
      .term-tab-close {
        margin-left: 2px; padding: 0 3px; border-radius: 4px;
        color: var(--faint); font-size: 12px; line-height: 1;
      }
      .term-tab-close:hover { color: var(--red); background: oklch(0.6 0.2 25 / 0.14); }
      .term-add {
        flex-shrink: 0; width: 22px; height: 22px;
        border: 1px solid var(--line); border-radius: 6px;
        background: transparent; color: var(--dim);
        font-size: 14px; line-height: 1; cursor: pointer;
        transition: color 140ms ease, border-color 140ms ease;
      }
      .term-add:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); }
      .term-add:disabled { opacity: 0.3; cursor: not-allowed; }
      .term-sessions { position: relative; height: calc(100% - 40px); }
      .term-session { position: absolute; inset: 0; display: flex; flex-direction: column; }
      .term-session .term-container { flex: 1; min-height: 0; padding: 4px 6px; }
      /* Status chip — shown for any non-connected state, hidden when connected. */
      .term-status {
        display: flex; align-items: center;
        margin: 8px; padding: 7px 11px; width: fit-content;
        border: 1px dashed var(--line); border-radius: 8px;
        background: oklch(0.74 0.13 56 / 0.04);
        color: var(--dim); font-size: 11px;
      }
      .term-status-connected { display: none; }

      /* ── Actions Log (it1) ───────────────────────────────────────────── */
      .alog-count { font-size: 10px; font-family: var(--font-mono); color: var(--faint); }
      .alog-list { padding: 4px 6px; overflow-y: auto; height: calc(100% - 40px); display: flex; flex-direction: column; gap: 1px; }
      .alog-row {
        display: flex; align-items: baseline; gap: 8px;
        padding: 3px 7px; border-radius: 5px; font-size: 11px; line-height: 1.45;
        animation: alogIn 260ms cubic-bezier(0.16,1,0.3,1) both;
      }
      .alog-row:hover { background: oklch(0.74 0.13 56 / 0.06); }
      @keyframes alogIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
      @media (prefers-reduced-motion: reduce) { .alog-row { animation: none; } }
      .alog-time { font-family: var(--font-mono); font-size: 10px; color: var(--faint); flex-shrink: 0; font-variant-numeric: tabular-nums; }
      .alog-icon { flex-shrink: 0; width: 11px; text-align: center; font-size: 10px; }
      .alog-label { color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .alog-alert  .alog-icon { color: var(--red, oklch(0.66 0.17 25)); }
      .alog-alert  .alog-label { color: var(--ink); }
      .alog-done   .alog-icon { color: var(--green, oklch(0.80 0.16 150)); }
      .alog-board  .alog-icon { color: var(--amber); }
      .alog-action .alog-icon { color: var(--cyan, oklch(0.80 0.10 200)); }
      .alog-action .alog-label { color: var(--ink); }
      .alog-info   .alog-icon { color: var(--faint); }

      /* ── Alert flash on the top bar (CC2) ────────────────────────────── */
      #topbar.alerting {
        animation: topbarAlert 1.1s ease-in-out infinite;
        border-bottom-color: var(--red);
      }
      @keyframes topbarAlert {
        0%, 100% { background: transparent; }
        50%      { background: oklch(0.66 0.17 25 / 0.16); }
      }
      @media (prefers-reduced-motion: reduce) { #topbar.alerting { animation: none; background: oklch(0.66 0.17 25 / 0.12); } }

      /* ── Needs-you rail (CC2) ────────────────────────────────────────── */
      .needs-count {
        font-size: 10px; font-weight: 700; color: var(--on-amber, #1A0E00);
        background: var(--amber); border-radius: 999px;
        min-width: 16px; text-align: center; padding: 1px 6px;
      }
      .needs-list { display: flex; flex-direction: column; gap: 4px; padding: 6px 8px; overflow-y: auto; height: calc(100% - 40px); }
      .needs-row {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 8px; border-radius: 7px;
        background: var(--card); border: 1px solid var(--line);
      }
      .needs-esc { border-color: oklch(0.66 0.17 25 / 0.5); }
      .needs-tag {
        font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
        padding: 2px 6px; border-radius: 5px; flex-shrink: 0;
      }
      .needs-tag-esc    { color: var(--red, oklch(0.66 0.17 25)); background: oklch(0.66 0.17 25 / 0.16); }
      .needs-tag-review { color: var(--amber); background: oklch(0.83 0.15 78 / 0.14); }
      .needs-info { display: flex; flex-direction: column; min-width: 0; flex: 1; }
      .needs-title { font-size: 12px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .needs-sub { font-size: 10px; color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .needs-approve {
        flex-shrink: 0; width: 26px; height: 26px; border-radius: 6px;
        font-size: 13px; color: var(--green, oklch(0.80 0.16 150));
        background: transparent; border: 1px solid var(--line); cursor: pointer;
        transition: background 100ms, border-color 100ms;
      }
      .needs-approve:hover { background: oklch(0.80 0.16 150 / 0.14); border-color: var(--green, oklch(0.80 0.16 150)); }
      .needs-approve[disabled] { opacity: 0.5; cursor: default; }

      .paused-badge {
        display: none;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: var(--amber);
        border: 1px solid var(--amber);
        padding: 2px 8px;
        border-radius: 4px;
        background: oklch(0.83 0.15 78 / 0.08);
        text-transform: uppercase;
        flex-shrink: 0;
      }
      .paused-badge.visible { display: block; }

      /* ── v2 Dashboard grid — CSS Grid layout fills available space ──── */
      #dashboard-grid {
        /* Base styles; JS initLayoutApplier() sets display:grid + row/col defs */
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .dashboard-cell {
        /* Grid child — no absolute positioning needed */
        position: relative;
        background:
          linear-gradient(180deg, oklch(0.21 0.018 60) 0%, oklch(0.175 0.016 58) 100%);
        border: 1px solid var(--line);
        border-radius: 9px;
        overflow: hidden;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        box-shadow:
          0 1px 0 oklch(0.45 0.02 64 / 0.18) inset,   /* top highlight */
          0 8px 22px oklch(0.06 0.01 55 / 0.45);        /* soft float */
        transition: border-color 160ms ease, box-shadow 220ms ease, transform 220ms cubic-bezier(0.16,1,0.3,1);
        animation: cellIn 360ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      /* Hairline sheen along the very top edge. */
      .dashboard-cell::before {
        content: '';
        position: absolute; inset: 0 0 auto 0; height: 1px;
        background: linear-gradient(90deg, transparent, oklch(0.74 0.13 56 / 0.35), transparent);
        opacity: 0.6; pointer-events: none;
      }
      .dashboard-cell:hover {
        border-color: oklch(0.74 0.13 56 / 0.55);
        box-shadow:
          0 1px 0 oklch(0.5 0.03 64 / 0.22) inset,
          0 10px 30px oklch(0.06 0.01 55 / 0.55),
          0 0 0 1px oklch(0.74 0.13 56 / 0.12);
        transform: translateY(-1px);
      }
      @keyframes cellIn {
        from { opacity: 0; transform: translateY(8px) scale(0.992); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }
      /* it11 — staggered entrance choreography (cells cascade in on load). */
      .dashboard-cell:nth-child(1)  { animation-delay: 0ms; }
      .dashboard-cell:nth-child(2)  { animation-delay: 45ms; }
      .dashboard-cell:nth-child(3)  { animation-delay: 90ms; }
      .dashboard-cell:nth-child(4)  { animation-delay: 135ms; }
      .dashboard-cell:nth-child(5)  { animation-delay: 180ms; }
      .dashboard-cell:nth-child(6)  { animation-delay: 225ms; }
      .dashboard-cell:nth-child(7)  { animation-delay: 270ms; }
      .dashboard-cell:nth-child(8)  { animation-delay: 315ms; }
      .dashboard-cell:nth-child(9)  { animation-delay: 360ms; }
      .dashboard-cell:nth-child(10) { animation-delay: 405ms; }
      .dashboard-cell:nth-child(11) { animation-delay: 450ms; }
      .dashboard-cell:nth-child(12) { animation-delay: 495ms; }
      .dashboard-cell:nth-child(n+13) { animation-delay: 540ms; }
      @media (prefers-reduced-motion: reduce) {
        .dashboard-cell { animation: none; }
        .dashboard-cell:hover { transform: none; }
      }

      /* ── v2 Panel components ────────────────────────────────────────── */
      .panel-header {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 8px 14px;
        border-bottom: 1px solid transparent;
        border-image: linear-gradient(90deg, oklch(0.30 0.02 64), transparent 85%) 1;
        flex-shrink: 0;
        cursor: pointer; /* CC5: click header to focus/expand this panel */
        transition: background 160ms ease;
      }
      .panel-header:hover { background: oklch(0.74 0.13 56 / 0.05); }
      .panel-header:hover .panel-label { color: var(--amber); }
      .panel-header:hover .panel-label::before { background: var(--amber); box-shadow: 0 0 8px var(--amber); }

      .panel-label {
        position: relative;
        display: inline-flex; align-items: center; gap: 8px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--accent-panel, var(--copper));
      }
      /* Leading accent tick before every panel label. */
      .panel-label::before {
        content: '';
        width: 3px; height: 12px; border-radius: 2px;
        background: var(--accent-panel, var(--copper));
        transition: background 160ms ease, box-shadow 160ms ease;
      }

      /* it8 — per-domain signature accents. Each panel carries a domain hue on
         its label + tick + top sheen, so the eye learns the board by color. */
      [data-plugin-id="escalations"], [data-plugin-id="needs-you"] { --accent-panel: var(--red, oklch(0.66 0.17 25)); }
      [data-plugin-id="crew-board"], [data-plugin-id="crew-board-full"], [data-plugin-id="kpi"] { --accent-panel: var(--amber); }
      [data-plugin-id="gpu"], [data-plugin-id="system"], [data-plugin-id="terminal"] { --accent-panel: var(--copper); }
      [data-plugin-id="telemetry"], [data-plugin-id="tokens-day"], [data-plugin-id="actions-log"] { --accent-panel: var(--cyan, oklch(0.80 0.10 200)); }
      [data-plugin-id="graph"], [data-plugin-id="git-activity"] { --accent-panel: var(--green, oklch(0.80 0.16 150)); }
      [data-plugin-id="docker"] { --accent-panel: oklch(0.72 0.10 235); }
      [data-plugin-id="content-gallery"] { --accent-panel: oklch(0.74 0.16 330); }
      [data-plugin-id="agenda"], [data-plugin-id="clock"] { --accent-panel: var(--faint); }

      /* ── P4 hybrid mode ────────────────────────────────────────────────── */
      /* Mode toggle button: amber when focus, dim when ambient. */
      .act-mode { font-variant-numeric: tabular-nums; }
      body.mode-focus .act-mode {
        color: var(--ink, oklch(0.16 0.01 70));
        background: var(--amber);
        border-color: var(--amber);
      }
      /* Ambient = read-only: hide the mutating controls (pause/task/goal). */
      body.mode-ambient .act-mutate { display: none; }
      /* Ambient = calm: stop only INFINITE/looping pulses (the 24/7 cost). We
         must NOT touch one-shot entry/fade-in animations — pausing those freezes
         the panel at its opacity:0 start frame and the whole cell renders black.
         So scope the pause to the known infinite-pulse utility classes only. */
      body.mode-ambient [class*="pulse"],
      body.mode-ambient [class*="-live"],
      body.mode-ambient .live-dot,
      body.mode-ambient .visualizer,
      body.mode-ambient .viz-bar {
        animation-play-state: paused !important;
      }
      /* Heavy live renderers suspended in ambient get a peek veil + label. */
      .dashboard-cell[data-suspended="1"] { position: relative; }
      .dashboard-cell[data-suspended="1"]::after {
        content: "ambient · click ◐ Focus to interact";
        position: absolute; inset: 0; display: flex;
        align-items: flex-end; justify-content: center; padding-bottom: 10px;
        font: 11px/1.2 ui-monospace, monospace; letter-spacing: 0.04em;
        color: var(--faint, oklch(0.62 0.02 70));
        background: linear-gradient(to bottom, transparent 55%, oklch(0.14 0.01 60 / 0.78));
        pointer-events: none;
      }
      /* Focus chrome: a hairline amber frame + corner pill so the mode reads at a glance. */
      body.mode-focus #app::after {
        content: "FOCUS";
        position: fixed; top: 6px; right: 12px; z-index: 60;
        font: 10px/1 ui-monospace, monospace; letter-spacing: 0.18em;
        color: var(--amber); opacity: 0.85; pointer-events: none;
      }
      body.mode-focus #dashboard-grid {
        outline: 1px solid var(--amber); outline-offset: -1px;
      }
      /* tint the top sheen to match the domain accent */
      .dashboard-cell::before { background: linear-gradient(90deg, transparent, var(--accent-panel, var(--copper)), transparent); opacity: 0.28; }

      /* ── Themed scrollbars everywhere (sexy consistency) ─────────────── */
      *::-webkit-scrollbar { width: 7px; height: 7px; }
      *::-webkit-scrollbar-track { background: transparent; }
      *::-webkit-scrollbar-thumb {
        background: oklch(0.34 0.02 64); border-radius: 4px;
        border: 1px solid transparent; background-clip: padding-box;
      }
      *::-webkit-scrollbar-thumb:hover { background: oklch(0.74 0.13 56 / 0.6); }
      * { scrollbar-width: thin; scrollbar-color: oklch(0.34 0.02 64) transparent; }

      /* Crew board v2 */
      .hero-progress-bar {
        position: relative;
        width: 100%;
        height: 5px;
        background: oklch(0.26 0.02 60);
        border-radius: 3px;
        margin: 8px 0;
        overflow: hidden;
      }
      .hero-progress-fill {
        position: relative;
        height: 100%;
        background: linear-gradient(90deg, var(--copper), var(--amber));
        border-radius: 3px;
        box-shadow: 0 0 10px oklch(0.83 0.15 78 / 0.55);
        transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
        overflow: hidden;
      }
      /* Travelling sheen across the filled portion. */
      .hero-progress-fill::after {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent, oklch(0.98 0.02 90 / 0.45), transparent);
        transform: translateX(-100%);
        animation: progressSheen 1.9s ease-in-out infinite;
      }
      @media (prefers-reduced-motion: reduce) { .hero-progress-fill::after { animation: none; } }
      @keyframes progressSheen {
        0% { transform: translateX(-100%); }
        60%, 100% { transform: translateX(100%); }
      }
      .hero-stalled {
        color: var(--amber);
        font-size: 10px;
        font-weight: 600;
      }

      /* GPU v2 */
      .gpu-panel-inner { padding: 10px; overflow-y: auto; height: 100%; }
      .gpu-card-v2 {
        background: var(--bg2);
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 10px;
        margin-bottom: 8px;
      }
      .gpu-card-name { font-size: 11px; font-weight: 600; color: var(--dim); margin-bottom: 6px; }
      .gpu-card-util { margin-bottom: 6px; }
      .gpu-bar-track { height: 6px; background: var(--line); border-radius: 3px; margin-bottom: 4px; }
      .gpu-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
      .gpu-bar-val { font-size: 10px; font-family: var(--font-mono); color: var(--dim); }

      /* ── GPU card v3 (CC3): per-card util + vram bars + role tag ──────── */
      .gpu-card-v3 {
        background: var(--card); border: 1px solid var(--line);
        border-radius: 7px; padding: 8px 10px; margin-bottom: 7px;
      }
      .gpu-card-top { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
      .gpu-card-top .gpu-card-name { font-size: 11px; font-weight: 600; color: var(--ink); margin: 0; }
      .gpu-role {
        font-size: 8px; font-weight: 700; letter-spacing: 0.08em;
        padding: 1px 5px; border-radius: 4px;
      }
      .gpu-role-ai     { color: var(--green, oklch(0.80 0.16 150)); background: oklch(0.80 0.16 150 / 0.14); }
      .gpu-role-gaming { color: var(--copper); background: oklch(0.74 0.13 56 / 0.16); }
      .gpu-game-tag { font-size: 9px; color: var(--amber); font-family: var(--font-mono); }
      .gpu-card-top .gpu-temp { margin-left: auto; font-size: 11px; font-family: var(--font-mono); }
      .gpu-metric { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
      .gpu-metric-lbl { font-size: 9px; color: var(--faint); width: 26px; text-transform: uppercase; letter-spacing: 0.05em; }
      .gpu-metric .gpu-bar-track { flex: 1; margin: 0; }
      .gpu-metric-val { font-size: 10px; font-family: var(--font-mono); color: var(--dim); width: 54px; text-align: right; }
      .gpu-card-meta { display: flex; gap: 10px; font-size: 11px; font-family: var(--font-mono); }
      .gpu-gaming-strip {
        display: flex; align-items: center; gap: 10px;
        padding: 8px; background: var(--bg2); border-radius: 4px; margin-bottom: 6px;
      }
      .gpu-gaming-icon { color: var(--amber); font-size: 18px; }
      .gpu-gaming-label { color: var(--amber); font-weight: 700; font-size: 12px; }
      .gpu-gaming-note { color: var(--faint); font-size: 10px; }

      /* Clock panel */
      .clock-panel {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: calc(100% - 40px); gap: 4px; padding: 10px;
      }
      .clock-time {
        font-family: var(--font-mono); font-size: 28px; font-weight: 700;
        color: var(--amber); letter-spacing: 0.06em; font-variant-numeric: tabular-nums;
      }
      .clock-date { font-size: 11px; color: var(--dim); letter-spacing: 0.06em; }
      .clock-meta { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-top: 8px; }
      .clock-meta-row { font-size: 10px; font-family: var(--font-mono); color: var(--faint); }

      /* Escalation badge v2 */
      .esc-badge-v2 {
        font-size: 11px; font-weight: 700; color: var(--faint);
        transition: color 0.3s;
      }
      .esc-badge-v2.active { color: var(--red); animation: pulse-esc 0.8s ease infinite; }
      @keyframes pulse-esc {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.6; }
      }
      .escalation-header { background: oklch(0.14 0.014 25 / 0.4); }
      .esc-summary { padding: 10px 14px; }
      .esc-open-count { font-size: 18px; font-weight: 700; color: var(--red); font-family: var(--font-mono); }
      .esc-top-reason { font-size: 11px; color: var(--dim); display: block; margin-top: 4px; }
      .esc-auth-note { padding: 10px 14px; }

      /* Telemetry v2 */
      .telemetry-charts-wrap { padding: 8px; overflow-y: auto; }

      /* Graph placeholder v2 */
      .graph-placeholder-v2 {
        display: flex; align-items: center; justify-content: center;
        height: calc(100% - 40px);
      }

      /* Agenda panel v2 */
      .agenda-panel { padding: 8px; overflow-y: auto; }

      /* Board footer */
      .board-footer {
        display: flex; gap: 12px; padding: 8px 14px;
        border-top: 1px solid var(--line);
        font-size: 10px; font-family: var(--font-mono); color: var(--faint);
        flex-shrink: 0;
      }
      .board-stat { color: var(--faint); }

      /* Crew-board v2 internals */
      .hero-body { min-width: 0; }
      .task-columns {
        display: flex; gap: 8px; flex: 1; min-height: 0; overflow: hidden;
        padding: 8px 14px;
      }
      .task-col {
        flex: 1; display: flex; flex-direction: column; min-width: 0; gap: 4px;
        overflow: hidden;
      }
      .task-col-header {
        font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--amber); flex-shrink: 0;
      }
      .task-count {
        font-family: var(--font-mono); font-size: 9px; color: var(--faint);
        margin-left: 4px;
      }

      /* Topbar tier badge */
      #topbar-tier {
        font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
        color: var(--faint); font-family: var(--font-mono);
      }
      #topbar-tier[data-tier="idle"]    { color: var(--green); }
      #topbar-tier[data-tier="busy"]    { color: var(--amber); }
      #topbar-tier[data-tier="gaming"]  { color: var(--red); }
      #topbar-tier[data-tier="offline"] { color: var(--faint); }

      /* Suno player v2 (inside plugin cell) */
      .suno-player-wrap { padding: 8px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; height: calc(100% - 40px); }
      .suno-now-playing { display: flex; gap: 10px; align-items: flex-start; }
      .suno-art { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; border: 1px solid var(--line); flex-shrink: 0; }
      .suno-now-info { flex: 1; min-width: 0; }
      .suno-title { font-size: 12px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .suno-artist { font-size: 11px; color: var(--dim); }
      .suno-duration { font-size: 10px; color: var(--faint); font-family: var(--font-mono); }
      .suno-transport { display: flex; align-items: center; gap: 6px; }
      .suno-btn { background: var(--bg2); border: 1px solid var(--line); color: var(--ink); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 14px; }
      .suno-btn.active { border-color: var(--amber); color: var(--amber); }
      .suno-btn-play { padding: 4px 14px; }
      .suno-scrub-wrap { display: flex; align-items: center; gap: 6px; }
      .suno-scrub { flex: 1; height: 3px; cursor: pointer; accent-color: var(--copper); }
      .suno-elapsed, .suno-remaining { font-size: 10px; font-family: var(--font-mono); color: var(--faint); min-width: 30px; }
      .suno-vol-wrap { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--faint); }
      .suno-volume { width: 60px; accent-color: var(--copper); cursor: pointer; }

      /* ── Main content area ──────────────────────────────────────────── */
      #content {
        display: grid;
        grid-template-columns: 1fr 1.6fr 1fr;
        gap: 0;
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }

      /* ── Panel columns ──────────────────────────────────────────────── */
      .panel-col {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 12px 14px;
        gap: 10px;
        min-height: 0;
      }
      .panel-col + .panel-col {
        border-left: 1px solid var(--line);
      }

      /* ── Section header (klabel style per DESIGN.md) ────────────────── */
      .klabel {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--amber);
        flex-shrink: 0;
      }
      .klabel::after {
        content: '';
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, var(--line), transparent);
      }
      .klabel-count {
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 500;
        color: var(--faint);
      }

      /* ── LEFT: Crew Board ───────────────────────────────────────────── */
      #board-panel {
        gap: 8px;
      }

      .hero-card {
        border-radius: 8px;
        background: var(--card);
        border: 1px solid var(--copper);
        padding: 12px 14px;
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }
      .hero-card.building {
        border-color: oklch(0.74 0.13 56 / 0.7);
        background:
          linear-gradient(180deg, oklch(0.23 0.03 62) 0%, oklch(0.185 0.018 58) 100%);
        animation: hero-glow 2.6s ease-in-out infinite;
      }
      @keyframes hero-glow {
        0%, 100% { box-shadow: 0 0 0 0 oklch(0.74 0.13 56 / 0); }
        50%       { box-shadow: 0 0 26px 5px oklch(0.74 0.13 56 / 0.38); }
      }
      .hero-card.building::after {
        content: '';
        position: absolute;
        top: 0; left: 0;
        width: 45%; height: 100%;
        background: linear-gradient(90deg, transparent, oklch(0.83 0.15 78 / 0.10), transparent);
        transform: translateX(-130%);
        animation: card-sweep 2.8s ease-in-out infinite;
      }
      @keyframes card-sweep {
        0%   { transform: translateX(-130%); }
        100% { transform: translateX(330%); }
      }
      @media (prefers-reduced-motion: reduce) {
        .live-dot, .hero-card.building, .hero-card.building::after { animation: none; }
      }

      .hero-label {
        font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--copper); margin-bottom: 4px;
      }
      .hero-title {
        font-size: 17px; font-weight: 800; color: var(--ink); letter-spacing: -0.01em;
        margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        text-shadow: 0 0 18px oklch(0.83 0.15 78 / 0.12);
      }
      .hero-slug {
        font-family: var(--font-mono); font-size: 10px; color: var(--faint); margin-bottom: 8px;
      }
      .hero-meta { display: flex; gap: 14px; flex-wrap: wrap; }
      .hero-stat {
        font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--dim);
      }
      .hero-stat span { color: var(--amber); }
      .hero-extra { font-size: 10px; color: var(--faint); }
      .hero-empty { font-size: 12px; color: var(--faint); font-style: italic; }

      .board-section { flex-shrink: 0; }
      .task-list {
        display: flex; flex-direction: column; gap: 3px;
        margin-top: 4px; max-height: 120px;
        overflow-y: auto; overflow-x: hidden;
        scrollbar-width: thin; scrollbar-color: var(--line) transparent;
      }
      .task-row {
        display: flex; align-items: center; gap: 6px;
        padding: 4px 8px; border-radius: 5px;
        background: var(--card); border: 1px solid var(--line);
        cursor: default; transition: border-color 100ms;
      }
      .task-row:hover { border-color: var(--amber); }
      .task-status-dot {
        width: 5px; height: 5px; border-radius: 50%;
        flex-shrink: 0; background: var(--faint);
      }
      .task-status-dot.in_progress { background: var(--copper); }
      .task-status-dot.ready       { background: var(--amber); }
      .task-status-dot.qa          { background: var(--cyan); }
      /* review = amber per the canon (copper=building, amber=review). */
      .task-status-dot.review      { background: var(--amber); }
      .task-status-dot.done        { background: var(--green); }
      .task-title {
        font-size: 11px; font-weight: 600; color: var(--ink);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
      }
      .task-assignee { font-size: 10px; color: var(--faint); flex-shrink: 0; }

      /* ── CENTER: Telemetry Wall ──────────────────────────────────────── */
      #center-panel { gap: 8px; overflow-y: auto; overflow-x: hidden;
        scrollbar-width: thin; scrollbar-color: var(--line) transparent; }

      /* GPU cards */
      #gpu-panel { flex-shrink: 0; }
      .gpu-card-row { display: flex; gap: 8px; flex-wrap: wrap; }
      .gpu-card {
        background: var(--card); border: 1px solid var(--line);
        border-radius: 8px; padding: 10px 12px;
        display: flex; flex-direction: column; align-items: center; gap: 4px;
        min-width: 200px; flex: 1;
      }
      .gpu-card.gpu-no-signal { opacity: 0.45; }
      .gpu-card-label {
        font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--copper); align-self: flex-start;
      }
      .gpu-gauge-canvas { display: block; }
      .gpu-card-meta {
        display: flex; gap: 10px; font-family: var(--font-mono); font-size: 10px;
        color: var(--dim); align-self: stretch; justify-content: space-between;
      }
      .gpu-temp { color: var(--amber); }
      .gpu-vram { color: var(--cyan); }
      .gpu-spark { width: 100%; }
      .gpu-no-signal-label { font-size: 10px; color: var(--faint); font-style: italic; }
      .gpu-mini-strip {
        font-size: 10px; color: var(--faint); font-family: var(--font-mono);
        display: flex; gap: 8px; padding: 4px 0;
        border-top: 1px solid var(--line); opacity: 0.55;
      }
      .gpu-mini-game.active { color: var(--red); opacity: 1; }
      .gpu-host-card {
        background: var(--card); border: 1px solid var(--line);
        border-radius: 8px; padding: 10px 12px;
        font-size: 11px;
      }
      .host-card-label {
        font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--copper); margin-bottom: 6px;
      }
      .host-row { display: flex; gap: 6px; align-items: baseline; margin-bottom: 3px; }
      .host-metric-label {
        font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
        text-transform: uppercase; color: var(--faint); min-width: 36px;
      }
      .host-metric-val { font-family: var(--font-mono); font-size: 13px; color: var(--amber); }
      .host-dim { font-size: 10px; color: var(--faint); margin-left: 4px; }
      .host-disks { display: flex; flex-direction: column; gap: 3px; margin: 6px 0; }
      .host-disk { display: flex; align-items: center; gap: 6px; font-size: 10px; }
      .host-disk-label { color: var(--faint); min-width: 36px; }
      .host-bar-track {
        flex: 1; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden;
      }
      .host-bar-fill { height: 100%; background: var(--cyan); border-radius: 2px; }
      .host-disk-pct { font-family: var(--font-mono); font-size: 10px; color: var(--dim); min-width: 30px; text-align: right; }
      .host-bots { display: flex; gap: 4px; flex-wrap: wrap; margin: 4px 0; }
      .bot-dot { font-size: 12px; cursor: default; }
      .bot-dot.running { color: var(--green); }
      .bot-dot.stopped { color: var(--faint); }
      .host-uptime { font-size: 10px; color: var(--faint); font-family: var(--font-mono); }

      /* Telemetry charts */
      #telemetry-charts { flex-shrink: 0; }
      .chart-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
      .chart-cell {
        background: var(--card); border: 1px solid var(--line); border-radius: 8px;
        padding: 8px 10px; flex: 1; min-width: 200px;
      }
      .chart-cell-label {
        font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--faint); margin-bottom: 6px;
        display: flex; align-items: center; gap: 8px;
      }
      .chart-canvas-wrap { overflow: hidden; }
      /* uPlot resets */
      .u-wrap { background: transparent !important; }
      .u-over, .u-under { background: transparent !important; }

      /* Pipeline mini bar chart */
      .pipeline-cell { min-width: 260px; }
      .pipeline-bars { display: flex; gap: 4px; align-items: flex-end; height: 64px; margin-bottom: 4px; }
      .pipeline-col { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
      .pipeline-bar-track {
        width: 100%; background: var(--bg2); border-radius: 2px 2px 0 0;
        flex: 1; display: flex; flex-direction: column; justify-content: flex-end;
      }
      .pipeline-bar-fill { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; }
      .pipeline-count { font-family: var(--font-mono); font-size: 10px; font-weight: 700; }
      .pipeline-label { font-size: 9px; color: var(--faint); }
      .parsefail-indicator { font-family: var(--font-mono); font-size: 10px; color: var(--faint); }
      .parsefail-indicator.alarm { color: var(--red); animation: alarm-flash 0.8s ease-in-out infinite; }
      @keyframes alarm-flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      @media (prefers-reduced-motion: reduce) { .parsefail-indicator.alarm { animation: none; } }
      .throughput-val { font-family: var(--font-mono); font-size: 10px; color: var(--dim); }

      /* Activity ticker */
      #activity-section { flex: 1; min-height: 0; overflow: hidden; }
      #activity-ticker {
        height: 100%; overflow-y: auto; overflow-x: hidden;
        display: flex; flex-direction: column; gap: 2px;
        scrollbar-width: thin; scrollbar-color: var(--line) transparent;
        font-family: var(--font-mono); font-size: 11px;
      }
      .ticker-row {
        display: flex; align-items: baseline; gap: 6px;
        padding: 3px 6px; border-radius: 4px; background: var(--bg2);
        border: 1px solid var(--line);
      }
      .ticker-row.ticker-stub  { opacity: 0.5; font-style: italic; }
      .ticker-time { color: var(--faint); font-size: 10px; flex-shrink: 0; }
      .ticker-dot  { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
      .ticker-row.ticker-alert .ticker-dot { background: var(--red); }
      .ticker-row.ticker-done  .ticker-dot { background: var(--green); }
      .ticker-msg  { color: var(--dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      /* ── RIGHT: Graph + Agenda ───────────────────────────────────────── */
      #right-panel { gap: 8px; overflow-y: auto; overflow-x: hidden;
        scrollbar-width: thin; scrollbar-color: var(--line) transparent; }

      /* Knowledge graph placeholder */
      #graph-placeholder {
        border: 1px solid var(--line); border-radius: 8px;
        background: var(--card);
        flex-shrink: 0; height: 340px;
        display: flex; align-items: center; justify-content: center;
      }
      .graph-ph-inner { display: flex; flex-direction: column; align-items: center; gap: 8px; }
      .graph-ph-glyph { font-size: 48px; color: oklch(0.74 0.13 56 / 0.3); line-height: 1; }
      .graph-ph-label {
        font-size: 12px; font-weight: 700; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--faint);
      }
      .graph-ph-sub { font-size: 10px; color: var(--faint); opacity: 0.6; }

      /* Escalations */
      #escalations-section { flex-shrink: 0; }
      .esc-badge {
        font-family: var(--font-mono); font-size: 10px; font-weight: 700;
        color: var(--faint); margin-left: 4px;
      }
      .esc-badge.active { color: var(--red); }
      #escalations-panel {
        display: flex; flex-direction: column; gap: 4px;
        max-height: 160px; overflow-y: auto;
        scrollbar-width: thin; scrollbar-color: var(--line) transparent;
      }
      .esc-row {
        display: flex; align-items: flex-start; gap: 6px;
        padding: 5px 8px; background: var(--card);
        border: 1px solid oklch(0.66 0.17 25 / 0.45); border-radius: 6px;
      }
      .esc-dot {
        width: 6px; height: 6px; border-radius: 50%; background: var(--red);
        flex-shrink: 0; margin-top: 3px;
      }
      .esc-body { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
      .esc-title { font-size: 11px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .esc-meta  { font-size: 9px; color: var(--faint); font-family: var(--font-mono); }

      /* Agenda */
      #agenda-section { flex-shrink: 0; }
      #agenda-panel {
        display: flex; flex-direction: column; gap: 4px;
        max-height: 160px; overflow-y: auto;
        scrollbar-width: thin; scrollbar-color: var(--line) transparent;
      }
      .agenda-row {
        display: flex; align-items: baseline; gap: 8px;
        padding: 5px 8px; background: var(--card);
        border: 1px solid var(--line); border-radius: 6px;
      }
      .agenda-time {
        font-family: var(--font-mono); font-size: 11px; font-weight: 700;
        color: var(--amber); flex-shrink: 0; min-width: 40px;
      }
      .agenda-body { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; }
      .agenda-title { font-size: 11px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .agenda-chip {
        font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
        background: var(--bg2); border: 1px solid var(--line); color: var(--dim);
        padding: 1px 5px; border-radius: 999px; flex-shrink: 0;
        font-family: var(--font-mono);
      }

      /* Stat cards (legacy Phase A / overview) */
      .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-shrink: 0; }
      .stat-card {
        background: var(--card); border: 1px solid var(--line);
        border-radius: 8px; padding: 10px 12px;
      }
      .stat-card.full-width { grid-column: 1 / -1; }
      .stat-label {
        font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--faint); margin-bottom: 4px;
      }
      .stat-value {
        font-family: var(--font-mono); font-size: 24px; font-weight: 700;
        color: var(--amber); font-variant-numeric: tabular-nums; line-height: 1;
      }
      .stat-sub { font-size: 10px; color: var(--dim); margin-top: 3px; }
      .cost-value {
        font-family: var(--font-mono); font-size: 20px; font-weight: 700;
        color: var(--cyan); font-variant-numeric: tabular-nums;
      }
      .token-row { display: flex; gap: 10px; margin-top: 4px; }
      .token-item { display: flex; flex-direction: column; }
      .token-label {
        font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--faint);
      }
      .token-value {
        font-family: var(--font-mono); font-size: 16px; font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .token-value.hive   { color: var(--green); }
      .token-value.claude { color: var(--violet); }
      .status-breakdown { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
      .status-chip {
        font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px;
        background: var(--bg2); border: 1px solid var(--line);
        color: var(--dim); font-variant-numeric: tabular-nums; font-family: var(--font-mono);
      }
      .status-chip.in_progress { color: var(--copper); border-color: var(--copper); }
      .status-chip.ready       { color: var(--amber);  border-color: var(--amber);  }
      .status-chip.done        { color: var(--green);  border-color: var(--green);  }
      .status-chip.qa          { color: var(--cyan);   border-color: var(--cyan);   }

      /* ── SUNO Player ─────────────────────────────────────────────── */
      #suno-section { flex-shrink: 0; }

      /* Now-playing card */
      .suno-now-card {
        background: var(--card); border: 1px solid var(--copper);
        border-radius: 8px; padding: 10px 12px;
        display: flex; flex-direction: column; gap: 8px;
      }
      .suno-art-row { display: flex; align-items: center; gap: 10px; }
      .suno-art {
        width: 52px; height: 52px; border-radius: 5px; object-fit: cover;
        flex-shrink: 0; background: var(--bg2); border: 1px solid var(--line);
      }
      .suno-art[src=""] { display: none; }
      .suno-meta { min-width: 0; flex: 1; }
      .suno-now-title {
        font-size: 13px; font-weight: 700; color: var(--ink);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .suno-now-artist { font-size: 11px; color: var(--copper); margin-top: 2px; }
      .suno-duration {
        font-family: var(--font-mono); font-size: 10px; color: var(--faint);
        margin-top: 2px;
      }

      /* Scrub bar */
      .suno-scrub-row {
        display: flex; align-items: center; gap: 6px;
        font-family: var(--font-mono); font-size: 10px; color: var(--faint);
      }
      #suno-scrub {
        flex: 1; height: 3px; cursor: pointer;
        accent-color: var(--copper);
        -webkit-appearance: none; appearance: none;
        background: var(--line); border-radius: 2px;
      }
      #suno-scrub::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 10px; height: 10px; border-radius: 50%;
        background: var(--copper); cursor: pointer;
      }

      /* Transport controls */
      .suno-transport {
        display: flex; align-items: center; justify-content: center; gap: 12px;
      }
      .suno-btn {
        background: none; border: none; cursor: pointer;
        color: var(--dim); font-size: 16px; line-height: 1;
        padding: 4px 6px; border-radius: 4px;
        transition: color 80ms, background 80ms;
      }
      .suno-btn:hover  { color: var(--amber); background: oklch(0.83 0.15 78 / 0.08); }
      .suno-btn.active { color: var(--copper); }
      #suno-btn-play {
        font-size: 20px; color: var(--amber);
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        border: 1px solid var(--copper); border-radius: 50%;
        background: oklch(0.74 0.13 56 / 0.08);
      }
      #suno-btn-play:hover { background: oklch(0.74 0.13 56 / 0.18); }

      /* Volume */
      .suno-vol-row {
        display: flex; align-items: center; gap: 6px;
        font-size: 10px; color: var(--faint);
      }
      #suno-volume {
        width: 64px; height: 3px; cursor: pointer;
        accent-color: var(--amber);
        -webkit-appearance: none; appearance: none;
        background: var(--line); border-radius: 2px;
      }

      /* List header: filter box + count */
      .suno-list-header {
        display: flex; align-items: center; gap: 6px;
        margin-top: 6px;
      }
      .suno-search {
        flex: 1; min-width: 0;
        font-family: inherit; font-size: 11px;
        color: var(--ink); background: var(--card);
        border: 1px solid var(--line); border-radius: 5px;
        padding: 3px 8px; outline: none;
        transition: border-color 100ms;
      }
      .suno-search::placeholder { color: var(--faint); }
      .suno-search:focus { border-color: var(--amber); }
      .suno-search::-webkit-search-cancel-button { -webkit-appearance: none; appearance: none; }
      .suno-count {
        flex-shrink: 0;
        font-size: 10px; color: var(--faint);
        font-variant-numeric: tabular-nums;
        min-width: 28px; text-align: right;
      }

      /* Track list */
      #suno-track-list {
        display: flex; flex-direction: column; gap: 2px;
        flex: 1; min-height: 80px;
        max-height: 320px; overflow-y: auto; overflow-x: hidden;
        scrollbar-width: thin; scrollbar-color: var(--line) transparent;
        margin-top: 4px;
      }
      .suno-track-row {
        display: flex; align-items: center; gap: 6px;
        padding: 4px 8px; border-radius: 5px;
        background: var(--card); border: 1px solid var(--line);
        cursor: pointer; transition: border-color 100ms;
        min-width: 0;
      }
      .suno-track-row:hover          { border-color: var(--amber); }
      .suno-track-row.suno-track-active {
        border-color: var(--copper);
        background: oklch(0.74 0.13 56 / 0.07);
      }
      .suno-track-play-indicator {
        font-size: 9px; color: var(--copper); flex-shrink: 0; width: 10px;
        text-align: center;
      }
      .suno-track-info { min-width: 0; flex: 1; display: flex; flex-direction: column; gap: 1px; }
      .suno-track-title {
        font-size: 11px; font-weight: 600; color: var(--ink);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .suno-track-artist { font-size: 9px; color: var(--faint); }
      .suno-track-dur {
        font-family: var(--font-mono); font-size: 10px; color: var(--dim);
        flex-shrink: 0;
      }

      /* Shared offline state */
      .offline-state {
        font-size: 12px; color: var(--faint); font-style: italic; padding: 10px 0;
      }
      .offline-state::before { content: '⬡ '; color: var(--amber); font-style: normal; }

      /* ── Footer ─────────────────────────────────────────────────────── */
      #footer {
        height: 28px;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        border-top: 1px solid var(--line); flex-shrink: 0;
        background: oklch(0.13 0.012 55 / 0.5);
      }
      .footer-hex {
        font-family: var(--font-mono); color: oklch(0.56 0.014 68 / 0.5);
        font-size: 13px; letter-spacing: 2px; user-select: none;
      }
      .footer-text {
        font-size: 9px; font-weight: 500; letter-spacing: 0.10em;
        color: var(--faint); opacity: 0.6;
      }

      /* ── Input probe (legacy Phase A — hidden in production-facing view) */
      #probe-panel { gap: 10px; }
      .probe-btn {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        padding: 16px 20px; border-radius: 8px;
        background: var(--card); border: 2px solid var(--amber);
        color: var(--amber); font-family: var(--font-ui); font-size: 14px;
        font-weight: 700; cursor: pointer; user-select: none; flex-shrink: 0;
        transition: background 120ms, box-shadow 120ms;
      }
      .probe-btn:hover {
        background: oklch(0.83 0.15 78 / 0.08);
        box-shadow: 0 0 14px oklch(0.83 0.15 78 / 0.22);
      }
      .probe-counter {
        font-family: var(--font-mono); font-size: 40px; font-weight: 700;
        color: var(--amber); text-align: center; font-variant-numeric: tabular-nums;
        flex-shrink: 0;
      }
      .probe-counter-label {
        font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--faint); text-align: center;
        margin-top: -4px; flex-shrink: 0;
      }
      .probe-info {
        font-size: 11px; color: var(--dim); background: var(--card);
        border: 1px solid var(--line); border-radius: 6px; padding: 8px 12px;
        flex-shrink: 0; font-family: var(--font-mono); line-height: 1.7;
      }
      .probe-info strong { color: var(--amber); font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="app">

      <!-- ── Topbar ─────────────────────────────────────────────────── -->
      <header id="topbar">
        <span class="logo-mark">hive</span>
        <span class="topbar-title">Hive Command Center</span>
        <div class="topbar-sep"></div>
        <div class="live-dot" id="live-dot"></div>
        <span class="live-label" id="live-label">live</span>
        <div class="topbar-sep"></div>
        <span class="board-state-chip" id="board-state-chip">loading…</span>
        <div class="topbar-sep"></div>
        <span class="topbar-clock" id="clock">--:--:--</span>
        <div class="topbar-sep"></div>
        <span class="topbar-esc-badge" id="topbar-esc-badge"></span>
        <div class="topbar-sep"></div>
        <span class="topbar-cost" id="topbar-cost">--</span>
        <div class="topbar-sep"></div>
        <span id="topbar-tier" data-tier="offline">offline</span>

        <div class="topbar-sep"></div>
        <!-- ── Mode toggle (P4): ambient ⇄ focus. Always visible (click target;
             Lively keyboard is unreliable). ───────────────────────────────── -->
        <button id="act-mode" class="act-btn act-mode" title="Toggle ambient / focus (Esc exits focus)">◐ Ambient</button>

        <!-- ── Command surface (CC1) ──────────────────────────────────── -->
        <div id="topbar-actions" class="topbar-actions">
          <button id="act-pause"   class="act-btn act-mutate" title="Pause/Resume dispatcher">⏸ Pause</button>
          <button id="act-task"    class="act-btn act-mutate" title="New task">+ Task</button>
          <button id="act-goal"    class="act-btn act-mutate" title="Decompose a goal into tasks">✦ Goal</button>
          <button id="act-board"   class="act-btn" title="Open the crew board web page">⊞ Board</button>
          <button id="act-palette" class="act-btn act-btn-icon" title="Command palette (Ctrl+K)">⌘</button>
        </div>

        <div class="topbar-spacer"></div>

        <!-- ── Suno mini-player (transport in the top bar) ─────────────── -->
        <div id="topbar-suno" class="topbar-suno">
          <button id="suno-btn-prev" class="suno-mini-btn" aria-label="Previous">⏮</button>
          <button id="suno-btn-play" class="suno-mini-btn suno-mini-play" aria-label="Play/Pause">▶</button>
          <button id="suno-btn-next" class="suno-mini-btn" aria-label="Next">⏭</button>
          <span id="suno-mini-title" class="suno-mini-title" title="">No track</span>
          <button id="suno-dd-toggle" class="suno-mini-btn suno-dd-toggle" aria-label="Browse songs" aria-expanded="false">▾</button>
        </div>

        <div class="topbar-sep"></div>
        <span class="paused-badge" id="paused-badge">Paused</span>
      </header>

      <!-- ── Suno dropdown: song navigator (hidden until toggled) ──────── -->
      <div id="suno-dropdown" class="suno-dropdown" hidden>
        <div class="suno-dd-now">
          <img id="suno-art" class="suno-art" src="" alt="" />
          <div class="suno-dd-now-info">
            <div id="suno-now-title"  class="suno-title">No tracks</div>
            <div id="suno-now-artist" class="suno-artist"></div>
            <div class="suno-dd-scrub">
              <span id="suno-elapsed"   class="suno-elapsed">0:00</span>
              <input id="suno-scrub"    class="suno-scrub" type="range" min="0" max="1000" value="0" />
              <span id="suno-remaining" class="suno-remaining">--:--</span>
            </div>
          </div>
          <span id="suno-duration" class="suno-duration">--:--</span>
        </div>
        <canvas id="suno-viz" class="suno-viz" width="360" height="44"></canvas>
        <div class="suno-dd-controls">
          <button id="suno-btn-shuffle" class="suno-btn" aria-label="Shuffle" aria-pressed="false">⇌ shuffle</button>
          <div class="suno-vol-wrap">
            <label class="suno-vol-label">vol</label>
            <input id="suno-volume" class="suno-volume" type="range" min="0" max="100" value="80" />
          </div>
        </div>
        <div class="suno-list-header">
          <input id="suno-search" class="suno-search" type="search" placeholder="filter tracks…" autocomplete="off" spellcheck="false" />
          <span id="suno-count" class="suno-count">0</span>
        </div>
        <div id="suno-track-list" class="suno-track-list"></div>
      </div>

      <!-- ── Command palette (Ctrl+K) ───────────────────────────────── -->
      <div id="cmd-palette" class="cmd-overlay" hidden>
        <div class="cmd-box">
          <input id="cmd-input" class="cmd-input" type="text" placeholder="Type a command…" autocomplete="off" spellcheck="false" />
          <div id="cmd-results" class="cmd-results"></div>
        </div>
      </div>

      <!-- ── Generic action modal (New Task / Goal) ─────────────────── -->
      <div id="cmd-modal" class="cmd-overlay" hidden>
        <div class="cmd-box cmd-modal-box">
          <div id="cmd-modal-title" class="cmd-modal-title">New task</div>
          <input id="cmd-modal-text" class="cmd-input" type="text" placeholder="" autocomplete="off" />
          <select id="cmd-modal-project" class="cmd-select"></select>
          <div class="cmd-modal-actions">
            <button id="cmd-modal-cancel" class="act-btn">Cancel</button>
            <button id="cmd-modal-submit" class="act-btn act-btn-primary">Create</button>
          </div>
          <div id="cmd-modal-msg" class="cmd-modal-msg"></div>
        </div>
      </div>

      <!-- ── Panels manager (CC6) ───────────────────────────────────── -->
      <div id="panels-modal" class="cmd-overlay" hidden>
        <div class="cmd-box cmd-modal-box">
          <div class="panels-head">
            <span class="cmd-modal-title">Panels</span>
            <button id="panels-modal-close" class="act-btn">✕</button>
          </div>
          <div id="panels-list" class="panels-list"></div>
          <div class="cmd-modal-msg">Toggles persist. Disabled panels never seat.</div>
        </div>
      </div>

      <!-- v2 dynamic layout grid (plugins mount here as absolute cells) -->
      <div id="dashboard-grid"></div>

      <!-- ── Main three-column grid ─────────────────────────────────── -->

      <!-- Footer -->
      <footer id="footer">
        <span class="footer-hex">⬡ ⬡ ⬡ ⬡ ⬡</span>
        <span class="footer-text">Hive Command Center · Phase B</span>
        <span class="footer-hex">⬡ ⬡ ⬡ ⬡ ⬡</span>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
