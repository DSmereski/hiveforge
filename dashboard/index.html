<!doctype html>
<html lang="en">
  <head>
    <script>
      /* C1 theme picker — 6 canonical Sample themes. No flash: theme is
         applied synchronously before first paint. Default = holo.
         Cycles: holo → terminal → brutalist → vector-tron → glitch-mag → hive-v2 */
      (function () {
        var THEMES = ['holo', 'terminal', 'brutalist', 'vector-tron', 'glitch-mag', 'hive-v2', 'joker', 'nod', 'synthwave', 'daybreak', 'royal', 'weatherstar', 'retro-purple', 'inverted', 'zombie', 'code-fall', 'winter', 'code-red'];
        function apply(t) {
          /* Always set the attribute — each theme has an explicit [data-theme] block.
             The :root block provides fallback base values; no-flash is achieved by
             this script running before first paint synchronously. */
          document.documentElement.dataset.theme = t;
        }
        var cur;
        try { cur = localStorage.getItem('hive.theme') || 'holo'; } catch (e) { cur = 'holo'; }
        if (THEMES.indexOf(cur) < 0) cur = 'holo';
        apply(cur);
        document.addEventListener('DOMContentLoaded', function () {
          var btn = document.getElementById('act-theme');
          if (!btn) return;
          function label() { btn.textContent = '◑ ' + cur; }
          label();
          btn.addEventListener('click', function () {
            cur = THEMES[(THEMES.indexOf(cur) + 1) % THEMES.length];
            apply(cur);
            try { localStorage.setItem('hive.theme', cur); } catch (e) {}
            label();
            window.dispatchEvent(new Event('hive-theme-change'));
          });
        });
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=5120, initial-scale=1.0" />
    <title>Hive Command Center</title>

    <!-- Material Icons for the honeycomb glyph -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <!-- Inter + JetBrains Mono -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Per-theme display + mono faces (#204). Loaded once; each theme opts in
         via --font-ui / --font-mono overrides. Robust fallbacks keep text
         readable if a web font fails to load (e.g. offline). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Oswald:wght@400;600;700&family=Cinzel:wght@500;700&family=Share+Tech+Mono&family=Special+Elite&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Reset ──────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Design tokens (OKLCH warm-black / copper / amber per DESIGN.md) */
      :root {
        --bg:        oklch(0.14 0.014 55);
        --bg2:       oklch(0.17 0.016 58);
        --card:      oklch(0.20 0.018 60);
        --line:      oklch(0.30 0.02  64);
        --ink:       oklch(0.95 0.012 72);
        --dim:       oklch(0.74 0.014 72);
        --faint:     oklch(0.63 0.015 68);
        --copper:    oklch(0.74 0.13  56);
        --amber:     oklch(0.83 0.15  78);
        --amber-glow:oklch(0.85 0.17  80);
        --green:     oklch(0.80 0.16 150);
        --red:       oklch(0.66 0.17  25);
        --cyan:      oklch(0.80 0.10 200);
        /* Claude = cyan per the canon (telemetry/system data). The earlier
           --violet was off-canon; aliased to cyan so any stragglers stay
           on-brand. */
        --violet:    var(--cyan);

        /* Hex for canvas */
        --hex-bg:     #121610;
        --hex-bg2:    #161a13;
        --hex-card:   #1c201a;
        --hex-line:   #363c30;
        --hex-ink:    #f2f0ec;
        --hex-dim:    #b8b4a8;
        --hex-faint:  #9c9890;
        --hex-copper: #c07840;
        --hex-amber:  #e0a030;
        --hex-green:  #5cc870;
        --hex-red:    #c44040;
        --hex-cyan:   #60c8c8;

        /* Semantic surface tokens — used in CSS rules below so they theme-swap.
           Each theme block overrides these for its palette. */
        --panel:           oklch(0.18 0.016 59);   /* dropdown / cmd-box bg   */
        --topbar-bg:       oklch(0.15 0.016 57 / 0.92); /* topbar translucent */
        --overlay-bg:      oklch(0.08 0.01 55 / 0.55);  /* modal dim overlay  */
        --viz-bg:          oklch(0.12 0.012 58);    /* suno visualizer bg     */
        --cell-bg-top:     oklch(0.21 0.018 60);    /* cell gradient top      */
        --cell-bg-bot:     oklch(0.175 0.016 58);   /* cell gradient bottom   */
        --cell-hi-top:     oklch(0.45 0.02 64 / 0.18);  /* cell inset top hl  */
        --cell-shadow:     oklch(0.06 0.01 55 / 0.45);  /* cell float shadow  */
        --cell-border-hov: oklch(0.74 0.13 56 / 0.55);  /* cell hover border  */
        --scrollbar-thumb: oklch(0.34 0.02 64);     /* scrollbar knob         */
        --track-bg:        oklch(0.26 0.02 60);     /* progress bar track     */
        --footer-bg:       oklch(0.13 0.012 55 / 0.5);  /* footer translucent */
        --esc-bg:          oklch(0.14 0.014 25 / 0.4);  /* escalation header  */
        --suspended-veil:  oklch(0.14 0.01 60 / 0.78);  /* ambient-mode veil  */
        --header-sep:      oklch(0.30 0.02 64);     /* panel header border    */
        --on-amber:        #1A0E00;                 /* text on amber bg       */

        /* Layout */
        --topbar-h: 56px;
        --font-ui:  'Inter', system-ui, sans-serif;
        --font-mono:'JetBrains Mono', ui-monospace, monospace;
      }

      /* ── Themes (C1) — 6 canonical Sample themes mapped to dashboard token vocab.
         Mapping: color-ink→bg levels, color-bone→ink, color-fog→dim,
         color-mist→faint, color-cyan→cyan+amber, color-magenta→copper,
         color-lime→green, standard red kept for status signals.
         holo = default (:root already). ──────────────────────── */

      /* holo — iridescent deep violet-black, cyan accent, magenta highlights. */
      html[data-theme="holo"] {
        --bg:        oklch(0.10 0.025 290); --bg2:  oklch(0.15 0.03 290);
        --card:      oklch(0.22 0.035 290); --line:  oklch(0.33 0.04 290);
        --ink:       oklch(0.96 0.008 240); --dim:   oklch(0.72 0.02 240); --faint: oklch(0.55 0.02 240);
        --copper:    oklch(0.68 0.27 340);
        --amber:     oklch(0.82 0.18 70);   --amber-glow: oklch(0.86 0.20 72);
        --green:     oklch(0.88 0.22 130);
        --red:       oklch(0.66 0.17 25);
        --cyan:      oklch(0.82 0.16 200);
        --violet:    var(--cyan);
        --hex-bg:    #0d0b17; --hex-bg2:  #131020; --hex-card: #1a1628;
        --hex-line:  #302845; --hex-ink:  #f5f4fa; --hex-dim:  #b0adcc;
        --hex-faint: #8a87aa; --hex-copper:#d050a0; --hex-amber:#d4a020;
        --hex-green: #9adc40; --hex-red:  #c44040; --hex-cyan: #60ccc8;
        --panel:           oklch(0.20 0.04 290);
        --topbar-bg:       oklch(0.14 0.03 290 / 0.92);
        --overlay-bg:      oklch(0.06 0.02 290 / 0.60);
        --viz-bg:          oklch(0.17 0.03 290);
        --cell-bg-top:     oklch(0.24 0.04 290); --cell-bg-bot: oklch(0.20 0.035 290);
        --cell-hi-top:     oklch(0.40 0.05 290 / 0.18);
        --cell-shadow:     oklch(0.04 0.02 280 / 0.55);
        --cell-border-hov: oklch(0.68 0.27 340 / 0.55);
        --scrollbar-thumb: oklch(0.28 0.04 290);
        --track-bg:        oklch(0.22 0.03 290);
        --footer-bg:       oklch(0.10 0.025 290 / 0.6);
        --esc-bg:          oklch(0.14 0.014 25 / 0.4);
        --suspended-veil:  oklch(0.14 0.03 290 / 0.78);
        --header-sep:      oklch(0.33 0.04 290);
        --on-amber:        #130800;
      }

      /* terminal — green-on-black CRT phosphor. Lime text, near-black ground. */
      html[data-theme="terminal"] {

        --amber:     oklch(0.88 0.22 130); --amber-glow: oklch(0.90 0.22 132);
        --green:     oklch(0.88 0.22 130);
        --red:       oklch(0.65 0.18 25);
        --cyan:      oklch(0.80 0.18 160);
        --violet:    var(--cyan);

        --hex-line:  #153020; --hex-ink:  #9aee60; --hex-dim:  #70cc40;
        --hex-faint: #4a9030; --hex-copper:#c0d840; --hex-amber:#9aee60;
        --hex-green: #9aee60; --hex-red:  #c44040; --hex-cyan: #50c878;
        --panel:           oklch(0.12 0.05 145);
        --topbar-bg:       oklch(0.09 0.04 150 / 0.92);

        --viz-bg:          oklch(0.10 0.04 148);
        --cell-bg-top:     oklch(0.16 0.055 145); --cell-bg-bot: oklch(0.13 0.05 146);
        --cell-hi-top:     oklch(0.40 0.10 130 / 0.15);
        --cell-shadow:     oklch(0.02 0.02 150 / 0.55);
        --cell-border-hov: oklch(0.78 0.20 95 / 0.55);
        --scrollbar-thumb: oklch(0.22 0.06 140);
        --track-bg:        oklch(0.18 0.05 145);
        --footer-bg:       oklch(0.08 0.04 150 / 0.6);
        --esc-bg:          oklch(0.14 0.014 25 / 0.4);

        --on-amber:        #030d06;

      /* brutalist — stark near-monochrome, no glow, RGB-split titles. */
      html[data-theme="brutalist"] {
        --bg:        oklch(0.06 0 0); --bg2:  oklch(0.10 0 0);
        --card:      oklch(0.14 0 0); --line:  oklch(0.28 0 0);
        --ink:       oklch(0.98 0 0); --dim:   oklch(0.75 0 0); --faint: oklch(0.55 0 0);
        --copper:    oklch(0.92 0.005 240);
        --amber:     oklch(0.98 0 0);       --amber-glow: oklch(1 0 0);
        --green:     oklch(0.85 0.005 240);
        --red:       oklch(0.70 0 0);
        --cyan:      oklch(0.92 0.005 240);
        --violet:    var(--cyan);
        --hex-bg:    #0f0f0f; --hex-bg2:  #1a1a1a; --hex-card: #222222;
        --hex-line:  #404040; --hex-ink:  #fafafa; --hex-dim:  #c0c0c0;
        --hex-faint: #808080; --hex-copper:#e8e8f0; --hex-amber:#ffffff;
        --hex-green: #d0d0d8; --hex-red:  #909090; --hex-cyan: #e8e8f0;
        --panel:           oklch(0.12 0 0);
        --topbar-bg:       oklch(0.08 0 0 / 0.95);
        --overlay-bg:      oklch(0.04 0 0 / 0.70);
        --viz-bg:          oklch(0.10 0 0);
        --cell-bg-top:     oklch(0.16 0 0); --cell-bg-bot: oklch(0.13 0 0);
        --cell-hi-top:     oklch(0.50 0 0 / 0.12);
        --cell-shadow:     oklch(0.02 0 0 / 0.70);
        --cell-border-hov: oklch(0.60 0 0 / 0.55);
        --scrollbar-thumb: oklch(0.28 0 0);
        --track-bg:        oklch(0.20 0 0);
        --footer-bg:       oklch(0.06 0 0 / 0.7);
        --esc-bg:          oklch(0.14 0 0 / 0.6);

      /* vector-tron — neon electric blue/violet on near-black. */
      html[data-theme="vector-tron"] {
        --bg:        oklch(0.06 0.05 280); --bg2:  oklch(0.10 0.05 280);

        --green:     oklch(0.78 0.18 160);
        --red:       oklch(0.66 0.17 25);
        --cyan:      oklch(0.85 0.20 220);

        --hex-bg:    #050612; --hex-bg2:  #0a0c1e; --hex-card: #101228;
        --hex-line:  #1e2450; --hex-ink:  #eef2ff; --hex-dim:  #8090d8;
        --hex-faint: #5060a0; --hex-copper:#c030c0; --hex-amber:#3090f8;
        --hex-green: #30d8a0; --hex-red:  #c44040; --hex-cyan: #3090f8;
        --panel:           oklch(0.12 0.06 278);
        --topbar-bg:       oklch(0.08 0.05 280 / 0.92);
        --overlay-bg:      oklch(0.04 0.04 280 / 0.65);
        --viz-bg:          oklch(0.10 0.055 278);
        --cell-bg-top:     oklch(0.16 0.07 278); --cell-bg-bot: oklch(0.13 0.06 278);
        --cell-hi-top:     oklch(0.50 0.12 270 / 0.15);
        --cell-shadow:     oklch(0.03 0.03 280 / 0.65);
        --cell-border-hov: oklch(0.65 0.30 320 / 0.55);
        --scrollbar-thumb: oklch(0.22 0.07 278);
        --track-bg:        oklch(0.18 0.06 278);
        --footer-bg:       oklch(0.06 0.05 280 / 0.65);
        --esc-bg:          oklch(0.14 0.014 25 / 0.4);
        --suspended-veil:  oklch(0.12 0.05 280 / 0.80);
        --header-sep:      oklch(0.26 0.08 270);
        --on-amber:        #050612;
      }

      /* glitch-mag — editorial warm-toned ink, cyan/magenta glitch accents. */
      html[data-theme="glitch-mag"] {
        --bg:        oklch(0.08 0.015 60); --bg2:  oklch(0.11 0.015 58);
        --card:      oklch(0.15 0.018 60); --line:  oklch(0.27 0.02 60);
        --ink:       oklch(0.97 0.005 60); --dim:   oklch(0.65 0.02 240); --faint: oklch(0.45 0.02 240);
        --copper:    oklch(0.68 0.27 340);
        --amber:     oklch(0.82 0.16 200); --amber-glow: oklch(0.86 0.18 202);
        --green:     oklch(0.72 0.18 150);
        --red:       oklch(0.66 0.17 25);
        --cyan:      oklch(0.82 0.16 200);
        --violet:    var(--cyan);
        --hex-bg:    #100d08; --hex-bg2:  #16120c; --hex-card: #1e1810;
        --hex-line:  #342e24; --hex-ink:  #faf8f4; --hex-dim:  #8898b0;
        --hex-faint: #606878; --hex-copper:#d020a0; --hex-amber:#40c8d0;
        --hex-green: #40c870; --hex-red:  #c44040; --hex-cyan: #40c8d0;
        --panel:           oklch(0.13 0.018 60);
        --topbar-bg:       oklch(0.10 0.015 60 / 0.92);
        --overlay-bg:      oklch(0.06 0.01 60 / 0.65);
        --viz-bg:          oklch(0.12 0.016 58);
        --cell-bg-top:     oklch(0.17 0.020 60); --cell-bg-bot: oklch(0.14 0.018 59);
        --cell-hi-top:     oklch(0.45 0.04 60 / 0.15);
        --cell-shadow:     oklch(0.04 0.01 60 / 0.60);
        --cell-border-hov: oklch(0.68 0.27 340 / 0.55);
        --scrollbar-thumb: oklch(0.24 0.02 60);
        --track-bg:        oklch(0.18 0.016 60);
        --footer-bg:       oklch(0.08 0.015 60 / 0.65);
        --esc-bg:          oklch(0.14 0.014 25 / 0.4);
        --suspended-veil:  oklch(0.12 0.015 60 / 0.80);
        --header-sep:      oklch(0.27 0.02 60);
        --on-amber:        #050b0b;
      }

      /* hive-v2 — warm-black command center, amber honeycomb brand. 1:1 from hive-v2 tokens. */
      html[data-theme="hive-v2"] {
        --bg:        oklch(0.14 0.014 55); --bg2:  oklch(0.17 0.016 58);
        --card:      oklch(0.20 0.018 60); --line:  oklch(0.30 0.02 64);
        --ink:       oklch(0.95 0.012 72); --dim:   oklch(0.74 0.014 72); --faint: oklch(0.64 0.014 70);
        --copper:    oklch(0.74 0.13 56);
        --amber:     oklch(0.83 0.15 78);  --amber-glow: oklch(0.85 0.17 80);
        --green:     oklch(0.80 0.16 150);
        --red:       oklch(0.66 0.17 25);
        --cyan:      oklch(0.80 0.10 200);
        --violet:    var(--cyan);
        --hex-bg:    #121610; --hex-bg2:  #161a13; --hex-card: #1c201a;
        --hex-line:  #363c30; --hex-ink:  #f2f0ec; --hex-dim:  #b8b4a8;
        --hex-faint: #9c9890; --hex-copper:#c07840; --hex-amber:#e0a030;
        --hex-green: #5cc870; --hex-red:  #c44040; --hex-cyan: #60c8c8;
        --panel:           oklch(0.18 0.016 59);
        --topbar-bg:       oklch(0.15 0.016 57 / 0.92);
        --overlay-bg:      oklch(0.08 0.01 55 / 0.55);
        --viz-bg:          oklch(0.12 0.012 58);
        --cell-bg-top:     oklch(0.21 0.018 60); --cell-bg-bot: oklch(0.175 0.016 58);
        --cell-hi-top:     oklch(0.45 0.02 64 / 0.18);
        --cell-shadow:     oklch(0.06 0.01 55 / 0.45);

        --amber:     oklch(0.58 0.23 25); --amber-glow: oklch(0.62 0.25 24);
        --green:     oklch(0.70 0.13 145);
        --red:       oklch(0.62 0.26 24);

        --hex-bg:    #0e0505; --hex-bg2:  #190808; --hex-card: #280d0d;
        --hex-line:  #3d1212; --hex-ink:  #f0e8e8; --hex-dim:  #a87878;
        --hex-faint: #784848; --hex-copper:#c02020; --hex-amber:#d02828;
        --hex-green: #50b050; --hex-red:  #e02020; --hex-cyan: #d02828;
        --panel:           oklch(0.18 0.04 24);
        --topbar-bg:       oklch(0.10 0.02 25 / 0.92);
        --overlay-bg:      oklch(0.05 0.01 25 / 0.65);
        --viz-bg:          oklch(0.11 0.022 24);
        --cell-bg-top:     oklch(0.22 0.048 25); --cell-bg-bot: oklch(0.18 0.038 24);
        --cell-hi-top:     oklch(0.40 0.08 22 / 0.18);
        --cell-shadow:     oklch(0.03 0.01 25 / 0.70);
        --cell-border-hov: oklch(0.62 0.26 24 / 0.55);
        --scrollbar-thumb: oklch(0.26 0.06 24);
        --track-bg:        oklch(0.20 0.04 24);
        --footer-bg:       oklch(0.08 0.012 25 / 0.65);
        --esc-bg:          oklch(0.20 0.10 24 / 0.5);
        --suspended-veil:  oklch(0.12 0.02 25 / 0.82);
        --header-sep:      oklch(0.30 0.07 22);
        --on-amber:        #0e0505;
      }

      /* synthwave — 80s retro sunset. Deep indigo ground, hot-magenta primary, cyan secondary. */
      html[data-theme="synthwave"] {
        --bg:        oklch(0.10 0.04 295); --bg2:  oklch(0.15 0.05 295);
        --card:      oklch(0.22 0.06 295); --line:  oklch(0.33 0.08 295);
        --ink:       oklch(0.94 0.02 300); --dim:   oklch(0.72 0.04 295); --faint: oklch(0.54 0.06 295);
        --copper:    oklch(0.68 0.30 335);
        --amber:     oklch(0.80 0.20 205); --amber-glow: oklch(0.84 0.22 205);
        --green:     oklch(0.84 0.18 145);
        --red:       oklch(0.66 0.17 25);
        --cyan:      oklch(0.80 0.20 205);
        --violet:    oklch(0.58 0.28 300);
        --hex-bg:    #0e0a1c; --hex-bg2:  #160e2a; --hex-card: #1e1438;
        --hex-line:  #301c54; --hex-ink:  #eed8f8; --hex-dim:  #b090c8;
        --hex-faint: #806898; --hex-copper:#f040c0; --hex-amber:#20d0f0;
        --hex-green: #80e870; --hex-red:  #e04060; --hex-cyan: #20d0f0;
        --panel:           oklch(0.20 0.06 295);
        --topbar-bg:       oklch(0.13 0.05 295 / 0.92);
        --overlay-bg:      oklch(0.06 0.03 295 / 0.65);
        --viz-bg:          oklch(0.17 0.05 295);
        --cell-bg-top:     oklch(0.24 0.07 295); --cell-bg-bot: oklch(0.20 0.06 295);
        --cell-hi-top:     oklch(0.46 0.10 295 / 0.18);
        --cell-shadow:     oklch(0.04 0.02 295 / 0.60);
        --cell-border-hov: oklch(0.68 0.30 335 / 0.55);
        --scrollbar-thumb: oklch(0.28 0.07 295);
        --track-bg:        oklch(0.22 0.06 295);
        --footer-bg:       oklch(0.10 0.04 295 / 0.65);
        --esc-bg:          oklch(0.14 0.014 25 / 0.4);
        --suspended-veil:  oklch(0.14 0.05 295 / 0.80);
        --header-sep:      oklch(0.33 0.08 295);
        --on-amber:        #00080e;
      }

      /* daybreak — warm paper light theme. Off-white/paper bg, near-black ink, deep teal accent. */
      html[data-theme="daybreak"] {
        --bg:        oklch(0.97 0.008 80); --bg2:  oklch(0.94 0.010 78);
        --card:      oklch(0.90 0.012 76); --line:  oklch(0.82 0.014 74);
        --ink:       oklch(0.18 0.030 220); --dim:   oklch(0.36 0.025 220); --faint: oklch(0.52 0.020 220);
        --copper:    oklch(0.52 0.14 192);
        --amber:     oklch(0.46 0.12 192); --amber-glow: oklch(0.50 0.14 192);
        --green:     oklch(0.45 0.10 150);
        --red:       oklch(0.50 0.20 25);
        --cyan:      oklch(0.46 0.12 192);
        --violet:    oklch(0.42 0.10 250);
        --hex-bg:    #f5f0e8; --hex-bg2:  #ece6da; --hex-card: #e2ddd0;
        --hex-line:  #c8c2b4; --hex-ink:  #1c1a14; --hex-dim:  #4a5060;
        --hex-faint: #7880a0; --hex-copper:#1a7878; --hex-amber:#1a7878;
        --hex-green: #2a6830; --hex-red:  #8c2020; --hex-cyan: #1a7878;
        --panel:           oklch(0.92 0.010 78);
        --topbar-bg:       oklch(0.93 0.010 78 / 0.94);
        --overlay-bg:      oklch(0.80 0.010 78 / 0.55);
        --viz-bg:          oklch(0.94 0.010 80);
        --cell-bg-top:     oklch(0.88 0.012 76); --cell-bg-bot: oklch(0.92 0.010 78);
        --cell-hi-top:     oklch(0.60 0.04 80 / 0.12);
        --cell-shadow:     oklch(0.30 0.02 220 / 0.18);
        --cell-border-hov: oklch(0.46 0.12 192 / 0.55);
        --scrollbar-thumb: oklch(0.76 0.016 76);
        --track-bg:        oklch(0.85 0.012 78);
        --footer-bg:       oklch(0.93 0.008 80 / 0.7);
        --esc-bg:          oklch(0.85 0.02 192 / 0.4);
        --suspended-veil:  oklch(0.90 0.010 78 / 0.82);
        --header-sep:      oklch(0.80 0.014 74);
        --on-amber:        #f5f0e8;
      }

      /* royal — deep navy ground, warm gold accent, ivory text. Classic office-stunning. */
      html[data-theme="royal"] {
        --bg:        oklch(0.12 0.04 250); --bg2:  oklch(0.17 0.05 250);
        --card:      oklch(0.24 0.06 250); --line:  oklch(0.34 0.07 250);
        --ink:       oklch(0.95 0.012 80); --dim:   oklch(0.76 0.025 250); --faint: oklch(0.58 0.035 250);
        --copper:    oklch(0.68 0.20 82);
        --amber:     oklch(0.80 0.18 82); --amber-glow: oklch(0.84 0.20 84);
        --green:     oklch(0.76 0.14 150);
        --red:       oklch(0.62 0.18 25);
        --cyan:      oklch(0.80 0.18 82);
        --violet:    oklch(0.54 0.18 270);
        --hex-bg:    #080c1a; --hex-bg2:  #0e1428; --hex-card: #141e38;
        --hex-line:  #1e2c52; --hex-ink:  #f2eddc; --hex-dim:  #a8a090;
        --hex-faint: #787060; --hex-copper:#c89020; --hex-amber:#d4a820;
        --hex-green: #58a858; --hex-red:  #c04040; --hex-cyan: #d4a820;
        --panel:           oklch(0.22 0.06 250);
        --topbar-bg:       oklch(0.15 0.05 250 / 0.92);
        --overlay-bg:      oklch(0.07 0.03 250 / 0.65);
        --viz-bg:          oklch(0.18 0.05 250);
        --cell-bg-top:     oklch(0.26 0.07 250); --cell-bg-bot: oklch(0.22 0.06 250);
        --cell-hi-top:     oklch(0.48 0.10 250 / 0.18);
        --cell-shadow:     oklch(0.04 0.02 250 / 0.65);
        --cell-border-hov: oklch(0.80 0.18 82 / 0.55);
        --scrollbar-thumb: oklch(0.30 0.07 250);
        --track-bg:        oklch(0.24 0.06 250);
        --footer-bg:       oklch(0.12 0.04 250 / 0.65);
        --esc-bg:          oklch(0.14 0.014 25 / 0.4);
        --suspended-veil:  oklch(0.16 0.05 250 / 0.82);
        --header-sep:      oklch(0.34 0.07 250);
        --on-amber:        #060810;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        background-image: radial-gradient(
          120% 80% at 50% -10%,
          var(--cell-bg-top),
          var(--bg)
        );
        color: var(--ink);
        font-family: var(--font-ui);
        font-size: 14px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Per-theme signature wallpapers ────────────────────────────────
         Each theme's body background mirrors Sample.com's visual identity,
         muted so panels + text stay readable on a dense dashboard.
         All treatments are CSS-only (gradients, pseudo-elements, SVG data-URIs)
         — no heavy animations that tax Lively WebView2.
      ─────────────────────────────────────────────────────────────────── */

      /* holo — iridescent radial: magenta + cyan corner glows on deep violet-black. */
      html[data-theme="holo"] body {
        background:
          radial-gradient(ellipse 60% 45% at 28% 12%,
            oklch(0.30 0.18 340 / 0.22), transparent 55%),
          radial-gradient(ellipse 55% 40% at 78% 88%,
            oklch(0.30 0.18 200 / 0.20), transparent 55%),
          var(--bg);
        background-attachment: fixed;
      }

      /* terminal — CRT phosphor: single centred green radial, scanline overlay via ::after. */
      html[data-theme="terminal"] body {
        background:
          radial-gradient(ellipse 70% 55% at 50% 50%,
            oklch(0.20 0.10 140 / 0.28), transparent 62%),
          var(--bg);
        background-attachment: fixed;
      }
      /* Scanline raster — static, GPU-cheap. */
      html[data-theme="terminal"] body::after {
        content: '';
        position: fixed; inset: 0;
        pointer-events: none;
        z-index: 0;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0, transparent 2px,
          oklch(0.88 0.22 130 / 0.05) 2px, oklch(0.88 0.22 130 / 0.05) 3px
        );
      }

      /* brutalist — stark solid: no gradient, no glow. Black only. */
      html[data-theme="brutalist"] body {
        background: var(--bg);
        background-image: none;
      }

      /* vector-tron — perspective grid: electric-blue vertical + purple horizontal lines. */
      html[data-theme="vector-tron"] body {
        background:
          linear-gradient(to bottom, transparent 60%, oklch(0.85 0.20 220 / 0.04) 100%),
          repeating-linear-gradient(
            to right,
            oklch(0.85 0.20 220 / 0.08) 0, oklch(0.85 0.20 220 / 0.08) 1px,
            transparent 1px, transparent 64px),
          repeating-linear-gradient(
            to bottom,
            oklch(0.65 0.30 320 / 0.06) 0, oklch(0.65 0.30 320 / 0.06) 1px,
            transparent 1px, transparent 64px),
          var(--bg);
        background-attachment: fixed;
      }

      /* glitch-mag — warm editorial: amber corner bloom top-right. */
      html[data-theme="glitch-mag"] body {
        background:
          radial-gradient(ellipse 50% 35% at 98% 2%,
            oklch(0.30 0.18 60 / 0.18), transparent 52%),
          var(--bg);
        background-attachment: fixed;
      }

      /* hive-v2 — amber honeycomb glow: soft top bloom (canonical hive look). */
      html[data-theme="hive-v2"] body {
        background:
          radial-gradient(120% 80% at 50% -10%,
            oklch(0.17 0.03 60), transparent 60%),
          var(--bg);
        background-attachment: fixed;
      }

      /* joker — purple haze: diffuse violet bloom left + acid-green glint right,
         muted enough for dense panel grid. */
      html[data-theme="joker"] body {
        background:
          radial-gradient(ellipse 65% 55% at 15% 20%,
            oklch(0.22 0.18 300 / 0.30), transparent 60%),
          radial-gradient(ellipse 45% 40% at 88% 75%,
            oklch(0.26 0.18 142 / 0.14), transparent 55%),
          var(--bg);
        background-attachment: fixed;
      }

      /* nod — Brotherhood of Nod: plain black backdrop, no hive-style bloom
         (David: "just a black background for this one"). */
      html[data-theme="nod"] body {
        background: var(--bg);
        background-image: none;
        background-attachment: fixed;
      }

      /* synthwave — sunset gradient: magenta bloom from bottom, cyan top-right glow. */
      html[data-theme="synthwave"] body {
        background:
          radial-gradient(ellipse 70% 50% at 50% 110%,
            oklch(0.40 0.28 335 / 0.30), transparent 60%),
          radial-gradient(ellipse 55% 40% at 88% 5%,
            oklch(0.35 0.22 205 / 0.22), transparent 55%),
          var(--bg);
        background-attachment: fixed;
      }

      /* daybreak — soft warm bloom top-centre on a light paper ground. */
      html[data-theme="daybreak"] body {
        background:
          radial-gradient(ellipse 80% 50% at 50% -10%,
            oklch(0.88 0.06 80 / 0.55), transparent 62%),
          var(--bg);
        background-attachment: fixed;
      }

      /* royal — deep cobalt-to-midnight gradient, gold glint top-right. */
      html[data-theme="royal"] body {
        background:
          radial-gradient(ellipse 55% 40% at 90% 5%,
            oklch(0.42 0.18 82 / 0.20), transparent 55%),
          radial-gradient(ellipse 75% 55% at 50% 50%,
            transparent 45%, oklch(0.06 0.02 250 / 0.50) 100%),
          var(--bg);
        background-attachment: fixed;
      }

      /* it12 — keyboard a11y: a consistent amber focus ring on every
         interactive element (buttons, rows, tiles, palette, track list). */
      :focus-visible {
        outline: 2px solid var(--amber);
        outline-offset: 2px;
        border-radius: 4px;
      }
      button:focus-visible, .act-btn:focus-visible, .cmd-row:focus-visible,
      .kpi-tile:focus-visible, .needs-row:focus-visible, .panel-header:focus-visible {
        outline: 2px solid var(--amber); outline-offset: 1px;
      }

      /* Weather-fx toggles (🌧 / ❄): dim until active, amber when on. */
      .act-fx { opacity: 0.55; }
      .act-fx.fx-on { opacity: 1; color: var(--amber); border-color: var(--amber); }

      /* ── Ambient glow layer (sexy depth, GPU-cheap) ─────────────────── */
      body::before {
        content: '';
        position: fixed; inset: -20%;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(38% 30% at 22% 18%, color-mix(in oklch, var(--copper) 10%, transparent), transparent 70%),
          radial-gradient(42% 34% at 82% 78%, color-mix(in oklch, var(--amber) 7%, transparent), transparent 72%),
          radial-gradient(30% 26% at 60% 50%, color-mix(in oklch, var(--cyan) 5%, transparent), transparent 75%);
        animation: ambientDrift 38s ease-in-out infinite alternate;
      }
      @keyframes ambientDrift {
        0%   { transform: translate3d(0,0,0) scale(1);     opacity: 0.85; }
        50%  { transform: translate3d(1.5%, -1.2%, 0) scale(1.06); opacity: 1; }
        100% { transform: translate3d(-1.2%, 1.4%, 0) scale(1.03); opacity: 0.9; }
      }
      @media (prefers-reduced-motion: reduce) { body::before { animation: none; } }

      /* ── Root layout ────────────────────────────────────────────────── */
      #app {
        position: relative;
        z-index: 1;       /* above the ambient glow layer */
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Topbar ─────────────────────────────────────────────────────── */
      #topbar {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 20px;
        height: var(--topbar-h);
        flex-shrink: 0;
        border-bottom: 1px solid var(--line);
        background: var(--topbar-bg);
        backdrop-filter: blur(8px);
        z-index: 10;
        flex-wrap: nowrap;
        /* Clip horizontal spill only; keep vertical VISIBLE so the ⋯ dropdown
           can extend below the bar (overflow:hidden clipped it under the grid). */
        overflow-x: clip;
        overflow-y: visible;
      }

      /* F2 top-bar groups: each group is a SINGLE horizontal row. Without this
         the group divs were unstyled blocks and their buttons wrapped, growing
         the bar to two lines. */
      .tb-group { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; flex-shrink: 0; }
      .tb-health { gap: 8px; }
      .tb-view, .tb-mutate { gap: 6px; }
      #topbar-board-switcher { display: flex; align-items: center; }

      /* ⋯ More: a tidy dropdown card anchored under the trigger (the classes had
         no CSS, so opening it dumped the buttons into the document flow). */
      .tb-more-wrap { position: relative; display: flex; align-items: center; }
      .tb-more-popover {
        position: fixed; top: var(--topbar-h, 56px); right: 12px; z-index: 9999;
        display: flex; flex-direction: column; gap: 4px; padding: 6px; min-width: 134px;
        background: color-mix(in oklch, var(--panel, var(--bg)) 94%, transparent);
        border: 1px solid var(--line); border-radius: 8px;
        box-shadow: 0 10px 28px oklch(0.05 0.01 60 / 0.45);
        backdrop-filter: blur(12px) saturate(1.3);
        transform-origin: top right;
        animation: tbMoreIn 120ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .tb-more-popover[hidden] { display: none; }
      .tb-more-item { width: 100%; justify-content: flex-start; text-align: left; }
      @keyframes tbMoreIn {
        from { opacity: 0; transform: translateY(-4px) scale(0.98); }
        to   { opacity: 1; transform: none; }
      }
      html[data-motion="off"] .tb-more-popover { animation: none; }

      /* Brand mark: the Material `hive_outlined` honeycomb glyph (amber),
         per DESIGN.md. Rendered as a Material Icons Outlined ligature so it
         matches the Flutter app's hex/honeycomb anchor. */
      .logo-mark {
        font-family: 'Material Icons Outlined';
        font-size: 22px;
        color: var(--amber);
        text-shadow: 0 0 12px color-mix(in oklch, var(--amber-glow) 60%, transparent);
        line-height: 1;
        user-select: none;
        flex-shrink: 0;
        -webkit-font-feature-settings: 'liga';
        font-feature-settings: 'liga';
      }

      /* Health pill: dot + status word inline + adjacent (the class had no CSS,
         so the dot div stacked above the word). */
      .topbar-health-pill { display: inline-flex; align-items: center; gap: 6px; }

      .topbar-title {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink);
        flex-shrink: 0;
      }

      .live-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        flex-shrink: 0;
        animation: pulse-dot 1.6s ease-in-out infinite;
      }
      .live-dot.offline { background: var(--red); animation: none; }

      @keyframes pulse-dot {
        0%, 100% { opacity: 0.5; transform: scale(0.9); }
        50%       { opacity: 1;   transform: scale(1.15); }
      }

      .live-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--green);
        letter-spacing: 0.06em;
        flex-shrink: 0;
      }
      .live-label.offline { color: var(--red); }

      .board-state-chip {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--dim);
        padding: 2px 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--card);
        flex-shrink: 0;
      }
      .board-state-chip.running { color: var(--green); border-color: var(--green); }
      .board-state-chip.paused  { color: var(--amber); border-color: var(--amber); }

      /* Full-board expand / back buttons + iframe embed */
      .board-expand-btn, .board-full-back {
        font-family: inherit; font-size: 10px; font-weight: 600;
        letter-spacing: 0.04em; color: var(--dim);
        background: var(--card); border: 1px solid var(--line);
        border-radius: 6px; padding: 2px 8px; cursor: pointer;
        transition: color 100ms, border-color 100ms; flex-shrink: 0;
      }
      .board-expand-btn:hover, .board-full-back:hover {
        color: var(--amber); border-color: var(--amber);
      }
      .board-full-frame-wrap {
        flex: 1; min-height: 0;
        border: 1px solid var(--line); border-radius: 8px;
        overflow: hidden; background: var(--bg);
      }
      .board-full-frame {
        width: 100%; height: 100%; border: 0; display: block;
        background: transparent;
      }

      .topbar-clock {
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 500;
        color: var(--dim);
        letter-spacing: 0.05em;
        font-variant-numeric: tabular-nums;
        flex-shrink: 0;
      }

      .topbar-esc-badge {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.10em;
        color: var(--faint);
        flex-shrink: 0;
      }
      .topbar-esc-badge.active { color: var(--red); }

      .topbar-cost {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
        color: var(--cyan);
        font-variant-numeric: tabular-nums;
        flex-shrink: 0;
      }

      /* Swarm pulse word in the topbar (replaces kpi top band). */
      .topbar-pulse {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--amber);
        flex-shrink: 0;
      }

      /* Activity feed source tags ([git] / [hive]) */
      .afeed-src-tag {
        font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
        padding: 1px 4px; border-radius: 3px; flex-shrink: 0;
      }
      .afeed-src-git    { color: var(--green); background: color-mix(in oklch, var(--green) 10%, transparent); }
      .afeed-src-action { color: var(--cyan);  background: color-mix(in oklch, var(--cyan)  10%, transparent); }

      .topbar-sep {
        width: 1px;
        height: 18px;
        background: var(--line);
        flex-shrink: 0;
      }

      .topbar-spacer { flex: 1; }

      /* ── Suno mini-player (top bar) ──────────────────────────────────── */
      .topbar-suno {
        display: flex; align-items: center; gap: 6px;
        height: 32px; padding: 0 4px 0 8px;
        border: 1px solid var(--line); border-radius: 999px;
        background: var(--card);
      }
      .suno-mini-btn {
        display: inline-flex; align-items: center; justify-content: center;
        width: 24px; height: 24px; padding: 0;
        font-size: 12px; line-height: 1; color: var(--dim);
        background: transparent; border: 0; border-radius: 50%;
        cursor: pointer; transition: color 100ms, background 100ms;
      }
      .suno-mini-btn:hover { color: var(--amber); background: color-mix(in oklch, var(--amber) 12%, transparent); }
      .suno-mini-play { color: var(--amber); font-size: 13px; }
      .suno-mini-title {
        max-width: 200px; overflow: hidden; text-overflow: ellipsis;
        white-space: nowrap; font-size: 11px; color: var(--ink);
        font-variant-numeric: tabular-nums;
      }
      .suno-dd-toggle { font-size: 10px; }
      .suno-dd-toggle[aria-expanded="true"] { color: var(--amber); transform: rotate(180deg); }

      /* ── Suno dropdown (song navigator) ──────────────────────────────── */
      .suno-dropdown {
        position: fixed; top: calc(var(--topbar-h) - 4px); right: 16px;
        width: 380px; max-height: 70vh; z-index: 50;
        display: flex; flex-direction: column; gap: 8px;
        padding: 12px; border: 1px solid var(--line); border-radius: 12px;
        background: var(--panel);
        box-shadow: 0 14px 40px var(--cell-shadow);
        animation: sunoDdIn 160ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .suno-dropdown[hidden] { display: none; }
      @keyframes sunoDdIn {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) { .suno-dropdown { animation: none; } }
      .suno-dd-now { display: flex; gap: 10px; align-items: flex-start; }
      .suno-dd-now-info { flex: 1; min-width: 0; }
      .suno-dd-scrub { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
      .suno-dd-controls {
        display: flex; align-items: center; justify-content: space-between;
        gap: 10px; padding-bottom: 4px; border-bottom: 1px solid var(--line);
      }
      .suno-viz {
        width: 100%; height: 40px; display: block;
        border-radius: 6px; background: var(--viz-bg);
        border: 1px solid var(--line);
      }

      /* ── Command surface (CC1) ───────────────────────────────────────── */
      .topbar-actions { display: flex; align-items: center; gap: 6px; margin-left: 12px; }
      .act-btn {
        font-family: inherit; font-size: 11px; font-weight: 600;
        letter-spacing: 0.03em; color: var(--dim);
        background: var(--card); border: 1px solid var(--line); border-radius: 7px;
        padding: 4px 10px; cursor: pointer; white-space: nowrap;
        transition: color 100ms, border-color 100ms, background 100ms;
      }
      .act-btn:hover { color: var(--amber); border-color: var(--amber); }
      .act-btn-icon { padding: 4px 9px; font-size: 12px; }
      .act-btn-primary { color: var(--on-amber, #1A0E00); background: var(--amber); border-color: var(--amber); }
      .act-btn-primary:hover { filter: brightness(1.08); color: var(--on-amber, #1A0E00); }
      #act-pause.is-paused { color: var(--amber); border-color: var(--amber); }

      .cmd-overlay {
        position: fixed; inset: 0; z-index: 100;
        display: flex; align-items: flex-start; justify-content: center;
        padding-top: 14vh; background: var(--overlay-bg);
      }
      .cmd-overlay[hidden] { display: none; }
      .cmd-box {
        width: 540px; max-width: 92vw;
        display: flex; flex-direction: column; gap: 8px;
        padding: 12px; border: 1px solid var(--line); border-radius: 12px;
        background: var(--panel); box-shadow: 0 18px 50px var(--cell-shadow);
        animation: sunoDdIn 150ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .cmd-input {
        font-family: inherit; font-size: 14px; color: var(--ink);
        background: var(--card); border: 1px solid var(--line); border-radius: 8px;
        padding: 9px 12px; outline: none;
      }
      .cmd-input:focus { border-color: var(--amber); }
      .cmd-select {
        font-family: inherit; font-size: 12px; color: var(--ink);
        background: var(--card); border: 1px solid var(--line); border-radius: 8px;
        padding: 7px 10px; outline: none;
      }
      .cmd-results { display: flex; flex-direction: column; gap: 2px; max-height: 50vh; overflow-y: auto; }
      .cmd-row {
        display: flex; align-items: center; gap: 8px;
        padding: 7px 10px; border-radius: 7px; cursor: pointer;
        font-size: 13px; color: var(--ink);
      }
      .cmd-row.sel, .cmd-row:hover { background: var(--card-hi, var(--card)); color: var(--amber); }
      .cmd-row .cmd-hint { margin-left: auto; font-size: 10px; color: var(--faint); }
      .cmd-modal-box { width: 460px; }
      .cmd-modal-title { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--amber); }
      .cmd-modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 2px; }
      .cmd-modal-msg { font-size: 11px; color: var(--faint); min-height: 14px; }

      /* ── Panels manager (CC6) ────────────────────────────────────────── */
      .panels-head { display: flex; align-items: center; justify-content: space-between; }
      .panels-list { display: flex; flex-direction: column; gap: 2px; max-height: 55vh; overflow-y: auto; }
      .panels-row { display: flex; align-items: center; gap: 9px; padding: 6px 8px; border-radius: 7px; cursor: pointer; }
      .panels-row:hover { background: var(--card); }
      .panels-toggle { accent-color: var(--amber); width: 15px; height: 15px; cursor: pointer; }
      .panels-name { font-size: 13px; color: var(--ink); }
      .panels-id { margin-left: auto; font-size: 10px; font-family: var(--font-mono); color: var(--faint); }

      /* ── System / Services panel (CC4) ───────────────────────────────── */
      .sys-body { padding: 8px 10px; overflow-y: auto; height: calc(100% - 40px); display: flex; flex-direction: column; gap: 10px; }
      .svc-dots { display: flex; flex-direction: column; gap: 3px; }
      .svc-dot-row { display: flex; align-items: center; gap: 7px; font-size: 11px; }
      .svc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .svc-up   { background: var(--green, oklch(0.80 0.16 150)); box-shadow: 0 0 6px var(--green, oklch(0.80 0.16 150)); }
      .svc-down { background: var(--red, oklch(0.66 0.17 25)); box-shadow: 0 0 6px var(--red, oklch(0.66 0.17 25)); }
      .svc-name { color: var(--ink); }
      .svc-uptime { margin-left: auto; font-size: 10px; font-family: var(--font-mono); color: var(--faint); }
      .sys-bars { display: flex; flex-direction: column; gap: 4px; }
      .sys-metric { display: flex; align-items: center; gap: 7px; }
      .sys-metric-lbl { font-size: 9px; color: var(--faint); width: 30px; text-transform: uppercase; letter-spacing: 0.04em; }
      .sys-metric .gpu-bar-track { flex: 1; margin: 0; }
      .sys-metric-val { font-size: 10px; font-family: var(--font-mono); color: var(--dim); width: 58px; text-align: right; }

      /* ── Content Gallery (image/video requests) ──────────────────────── */
      .cg-count { font-size: 10px; font-family: var(--font-mono); color: var(--faint); }
      .cg-grid {
        padding: 8px; overflow-y: auto; height: calc(100% - 40px);
        display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
        gap: 8px; align-content: start;
      }
      .cg-item { display: flex; flex-direction: column; gap: 3px; }
      .cg-thumbs { display: flex; gap: 3px; }
      .cg-thumb {
        width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 7px;
        border: 1px solid var(--line); cursor: zoom-in; background: var(--card);
        transition: border-color 120ms, transform 160ms cubic-bezier(0.16,1,0.3,1);
      }
      .cg-thumb:hover { border-color: var(--amber); transform: scale(1.03); }
      .cg-pending {
        width: 100%; aspect-ratio: 1; border-radius: 7px;
        border: 1px dashed var(--line); display: flex; align-items: center; justify-content: center;
        font-size: 10px; font-family: var(--font-mono); color: var(--amber);
        background: color-mix(in oklch, var(--amber) 5%, transparent); text-align: center;
      }
      .cg-pending.cg-failed { color: var(--red, oklch(0.66 0.17 25)); border-color: color-mix(in oklch, var(--red) 40%, transparent); }
      .cg-meta { display: flex; align-items: baseline; gap: 5px; min-width: 0; }
      .cg-type { font-size: 10px; color: var(--amber); flex-shrink: 0; }
      .cg-prompt { font-size: 10px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .cg-lightbox {
        position: fixed; inset: 0; z-index: 120; cursor: zoom-out;
        display: flex; align-items: center; justify-content: center;
        background: color-mix(in oklch, var(--bg) 85%, transparent); padding: 4vh;
      }
      .cg-lightbox[hidden] { display: none; }
      .cg-lightbox img {
        max-width: 92vw; max-height: 92vh; border-radius: 10px;
        border: 1px solid var(--line); box-shadow: 0 20px 60px color-mix(in oklch, var(--bg) 70%, transparent);
      }

      /* ── Git activity (it10) ─────────────────────────────────────────── */
      .git-count { font-size: 10px; font-family: var(--font-mono); color: var(--faint); }
      .git-list { padding: 5px 7px; overflow-y: auto; height: calc(100% - 40px); display: flex; flex-direction: column; gap: 2px; }
      .git-row { display: flex; align-items: baseline; gap: 8px; padding: 4px 6px; border-radius: 6px; }
      .git-row:hover { background: color-mix(in oklch, var(--green) 6%, transparent); }
      .git-hash { font-family: var(--font-mono); font-size: 10px; color: var(--green, oklch(0.80 0.16 150)); flex-shrink: 0; }
      .git-info { display: flex; flex-direction: column; min-width: 0; }
      .git-subject { font-size: 11px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .git-sub { font-size: 9px; color: var(--faint); }

      /* ── Docker panel (CC4 add-on) ───────────────────────────────────── */
      .dk-count { font-size: 10px; font-family: var(--font-mono); color: var(--faint); }
      .dk-body { padding: 6px 8px; overflow-y: auto; height: calc(100% - 40px); display: flex; flex-direction: column; gap: 3px; }
      .dk-row { display: flex; align-items: center; gap: 7px; padding: 4px 6px; border-radius: 6px; background: var(--card); border: 1px solid var(--line); }
      .dk-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .dk-up   { background: var(--green, oklch(0.80 0.16 150)); box-shadow: 0 0 6px var(--green, oklch(0.80 0.16 150)); }
      .dk-down { background: var(--faint); }
      .dk-warn { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
      .dk-bad  { background: var(--red, oklch(0.66 0.17 25)); box-shadow: 0 0 6px var(--red, oklch(0.66 0.17 25)); }
      .dk-info { display: flex; flex-direction: column; min-width: 0; flex: 1; }
      .dk-name { font-size: 11px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .dk-sub { font-size: 9px; color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .dk-status { font-size: 9px; font-family: var(--font-mono); color: var(--dim); flex-shrink: 0; }

      /* ── Crew-board hero enrich (it7) ────────────────────────────────── */
      .hero-grid { display: flex; align-items: center; gap: 14px; }
      .hero-ring { width: 52px; height: 52px; flex-shrink: 0; transform: rotate(-90deg); }
      .hero-ring-bg { fill: none; stroke: var(--line); stroke-width: 4; }
      .hero-ring-fg {
        fill: none; stroke: var(--amber); stroke-width: 4; stroke-linecap: round;
        filter: drop-shadow(0 0 4px color-mix(in oklch, var(--amber) 50%, transparent));
        transition: stroke-dashoffset 0.6s cubic-bezier(0.16,1,0.3,1);
      }
      .hero-ring-txt {
        fill: var(--amber); font-family: var(--font-mono); font-size: 12px; font-weight: 700;
        transform: rotate(90deg); transform-origin: 20px 20px;
      }
      .hero-main { flex: 1; min-width: 0; }
      .hero-now-doing {
        display: flex; align-items: center; gap: 6px; margin: 4px 0 6px;
        font-family: var(--font-mono); font-size: 11px; color: var(--cyan, oklch(0.80 0.10 200));
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .hero-now-dot {
        width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
        background: var(--cyan, oklch(0.80 0.10 200));
        box-shadow: 0 0 6px var(--cyan, oklch(0.80 0.10 200));
        animation: livepulse 1.6s ease-in-out infinite;
      }
      @media (prefers-reduced-motion: reduce) { .hero-now-dot { animation: none; } }
      .hero-tok {
        font-family: var(--font-mono); font-size: 10px; padding: 1px 6px; border-radius: 5px;
        border: 1px solid var(--line);
      }
      .hero-tok.tok-hive   { color: var(--green, oklch(0.80 0.16 150)); }
      .hero-tok.tok-claude { color: var(--cyan, oklch(0.80 0.10 200)); }

      /* ── Status hero zone (P1 — "bigger stat area") ──────────────────── */
      .hero {
        display: grid;
        grid-template-columns: minmax(150px, 0.9fr) minmax(0, 2.2fr) minmax(200px, 1.3fr);
        align-items: stretch; height: 100%; gap: 1px;
      }
      .hero > div { padding: 8px 14px; display: flex; flex-direction: column; min-width: 0; }
      .hero-pulse { justify-content: center; gap: 3px; border-right: 1px solid var(--line); }
      .hero-pulse-word {
        font-family: var(--font-mono); font-weight: 800; line-height: 1;
        font-size: clamp(20px, 3vh, 34px); letter-spacing: -0.01em;
      }
      .hero-pulse-sub { font-size: 11px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .hero-vitals { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
      .hero-vital {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 2px 7px; border: 1px solid var(--line); border-radius: 999px;
        font-size: 9.5px; font-family: var(--font-mono); color: var(--dim);
        text-transform: uppercase; letter-spacing: 0.04em;
      }
      .hero-vital.is-warn { border-color: color-mix(in oklch, var(--red) 50%, transparent); color: var(--red); }
      .hero-vital-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

      .hero-lanes-wrap { justify-content: flex-start; gap: 4px; border-right: 1px solid var(--line); overflow-y: auto; }
      .hero-lane { display: flex; flex-direction: column; gap: 2px; padding: 3px 0; cursor: pointer; }
      .hero-lane:hover .hero-lane-name { color: var(--amber); }
      .hero-lane-top { display: flex; align-items: baseline; gap: 8px; }
      .hero-lane-name {
        font-size: 12px; font-weight: 600; color: var(--ink); flex: 1; min-width: 0;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 140ms ease;
      }
      .hero-lane-turns { font-family: var(--font-mono); font-size: 10px; color: var(--copper); flex-shrink: 0; }
      .hero-lane-stall { font-size: 9px; text-transform: uppercase; color: var(--red); letter-spacing: 0.06em; flex-shrink: 0; }
      .hero-lane-now {
        font-size: 10.5px; color: var(--dim);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .hero-lane-bar { height: 3px; border-radius: 2px; background: color-mix(in oklch, var(--line) 50%, transparent); overflow: hidden; }
      .hero-lane-bar > span { display: block; height: 100%; background: var(--amber); border-radius: 2px; transition: width 600ms cubic-bezier(0.16,1,0.3,1); }
      .hero-lane.is-stalled .hero-lane-bar > span { background: var(--red); }
      .hero-lanes-empty, .hero-lanes-more { font-size: 11px; color: var(--faint); padding: 4px 0; }

      /* `.hero > .hero-head` (0,0,2,0) beats `.hero > div` (0,0,1,1) so grid wins over the flex default. */
      .hero > .hero-head { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; align-content: center; }
      .hero-head-tile { display: flex; flex-direction: column; gap: 1px; min-width: 0; cursor: pointer; }
      .hero-head-value {
        font-family: var(--font-mono); font-variant-numeric: tabular-nums;
        font-size: clamp(18px, 2.6vh, 30px); font-weight: 700; line-height: 1; letter-spacing: -0.02em;
      }
      .hero-head-label { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); }
      .hero-head-spark { width: 72px; height: 16px; opacity: 0.8; margin-top: 1px; }
      .kpi-pop .hero-head-value { animation: kpiNum 420ms cubic-bezier(0.16,1,0.3,1); }
      @keyframes kpiNum { 0% { transform: scale(1); } 36% { transform: scale(1.16); } 100% { transform: scale(1); } }
      @media (prefers-reduced-motion: reduce) { .kpi-pop .hero-head-value { animation: none; } }

      /* ── Connect chip — unconfigured panels (it3) ────────────────────── */
      .cfg-chip {
        display: flex; align-items: center; gap: 8px;
        margin: 8px; padding: 7px 11px;
        border: 1px dashed var(--line); border-radius: 8px;
        background: color-mix(in oklch, var(--copper) 4%, transparent);
        font-size: 11px; color: var(--dim); width: fit-content;
      }
      .cfg-dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: var(--faint); flex-shrink: 0;
      }
      .cfg-label { color: var(--ink); font-weight: 600; }
      .cfg-hint { color: var(--faint); font-size: 10px; }
      /* ── Actions Log (it1) ───────────────────────────────────────────── */
      .alog-count { font-size: 10px; font-family: var(--font-mono); color: var(--faint); }
      .alog-list { padding: 4px 6px; overflow-y: auto; height: calc(100% - 40px); display: flex; flex-direction: column; gap: 1px; }
      .alog-row {
        display: flex; align-items: baseline; gap: 8px;
        padding: 3px 7px; border-radius: 5px; font-size: 11px; line-height: 1.45;
        animation: alogIn 260ms cubic-bezier(0.16,1,0.3,1) both;
      }
      .alog-row:hover { background: color-mix(in oklch, var(--copper) 6%, transparent); }
      @keyframes alogIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
      @media (prefers-reduced-motion: reduce) { .alog-row { animation: none; } }
      .alog-time { font-family: var(--font-mono); font-size: 10px; color: var(--faint); flex-shrink: 0; font-variant-numeric: tabular-nums; }
      .alog-icon { flex-shrink: 0; width: 11px; text-align: center; font-size: 10px; }
      .alog-label { color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .alog-alert  .alog-icon { color: var(--red, oklch(0.66 0.17 25)); }
      .alog-alert  .alog-label { color: var(--ink); }
      .alog-done   .alog-icon { color: var(--green, oklch(0.80 0.16 150)); }
      .alog-board  .alog-icon { color: var(--amber); }
      .alog-action .alog-icon { color: var(--cyan, oklch(0.80 0.10 200)); }
      .alog-action .alog-label { color: var(--ink); }
      .alog-info   .alog-icon { color: var(--faint); }

      /* ── Needs-you rows folded into the Activity feed (P5 v-Next) ─────── */
      /* Priority-flagged, clickable rows pinned at the top of the feed.
         Reuses the needs-you rail's visual language (ESC red / REVIEW amber). */
      .afeed-needs {
        align-items: center; gap: 8px;
        padding: 6px 8px; margin-bottom: 3px; border-radius: 7px;
        background: var(--card); border: 1px solid var(--line); cursor: pointer;
      }
      .afeed-needs:hover { background: color-mix(in oklch, var(--copper) 7%, transparent); }
      .afeed-needs-esc { border-color: color-mix(in oklch, var(--red) 50%, transparent); }
      .afeed-needs-tag {
        font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
        padding: 2px 6px; border-radius: 5px; flex-shrink: 0;
      }
      .afeed-needs-tag-esc    { color: var(--red, oklch(0.66 0.17 25)); background: color-mix(in oklch, var(--red) 16%, transparent); }
      .afeed-needs-tag-review { color: var(--amber); background: color-mix(in oklch, var(--amber) 14%, transparent); }
      .afeed-needs-info { display: flex; flex-direction: column; min-width: 0; flex: 1; }
      .afeed-needs-title { font-size: 12px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .afeed-needs-sub { font-size: 10px; color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .afeed-needs-approve {
        flex-shrink: 0; width: 26px; height: 26px; border-radius: 6px;
        font-size: 13px; color: var(--green, oklch(0.80 0.16 150));
        background: transparent; border: 1px solid var(--line); cursor: pointer;
        transition: background 100ms, border-color 100ms;
      }
      .afeed-needs-approve:hover { background: color-mix(in oklch, var(--green) 14%, transparent); border-color: var(--green, oklch(0.80 0.16 150)); }
      .afeed-needs-approve[disabled] { opacity: 0.5; cursor: default; }

      /* ── Alert flash on the top bar (CC2) ────────────────────────────── */
      #topbar.alerting {
        animation: topbarAlert 1.1s ease-in-out infinite;
        border-bottom-color: var(--red);
      }
      @keyframes topbarAlert {
        0%, 100% { background: transparent; }
        50%      { background: color-mix(in oklch, var(--red) 16%, transparent); }
      }
      @media (prefers-reduced-motion: reduce) { #topbar.alerting { animation: none; background: color-mix(in oklch, var(--red) 12%, transparent); } }

      /* ── Needs-you rail (CC2) ────────────────────────────────────────── */
      .needs-count {
        font-size: 10px; font-weight: 700; color: var(--on-amber, #1A0E00);
        background: var(--amber); border-radius: 999px;
        min-width: 16px; text-align: center; padding: 1px 6px;
      }
      .needs-list { display: flex; flex-direction: column; gap: 4px; padding: 6px 8px; overflow-y: auto; height: calc(100% - 40px); }
      .needs-row {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 8px; border-radius: 7px;
        background: var(--card); border: 1px solid var(--line);
      }
      .needs-esc { border-color: color-mix(in oklch, var(--red) 50%, transparent); }
      .needs-tag {
        font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
        padding: 2px 6px; border-radius: 5px; flex-shrink: 0;
      }
      .needs-tag-esc    { color: var(--red, oklch(0.66 0.17 25)); background: color-mix(in oklch, var(--red) 16%, transparent); }
      .needs-tag-review { color: var(--amber); background: color-mix(in oklch, var(--amber) 14%, transparent); }
      .needs-info { display: flex; flex-direction: column; min-width: 0; flex: 1; }
      .needs-title { font-size: 12px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .needs-sub { font-size: 10px; color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .needs-approve {
        flex-shrink: 0; width: 26px; height: 26px; border-radius: 6px;
        font-size: 13px; color: var(--green, oklch(0.80 0.16 150));
        background: transparent; border: 1px solid var(--line); cursor: pointer;
        transition: background 100ms, border-color 100ms;
      }
      .needs-approve:hover { background: color-mix(in oklch, var(--green) 14%, transparent); border-color: var(--green, oklch(0.80 0.16 150)); }
      .needs-approve[disabled] { opacity: 0.5; cursor: default; }

      .paused-badge {
        display: none;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: var(--amber);
        border: 1px solid var(--amber);
        padding: 2px 8px;
        border-radius: 4px;
        background: color-mix(in oklch, var(--amber) 8%, transparent);
        text-transform: uppercase;
        flex-shrink: 0;
      }
      .paused-badge.visible { display: block; }

      /* ── v2 Dashboard grid — CSS Grid layout fills available space ──── */
      #dashboard-grid {
        /* Base styles; JS initLayoutApplier() sets display:grid + row/col defs */
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .dashboard-cell {
        /* Grid child — no absolute positioning needed */
        position: relative;
        background:
          linear-gradient(180deg, var(--cell-bg-top) 0%, var(--cell-bg-bot) 100%);
        border: 1px solid var(--line);
        border-radius: 9px;
        overflow: hidden;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        box-shadow:
          0 1px 0 var(--cell-hi-top) inset,   /* top highlight */
          0 8px 22px var(--cell-shadow);        /* soft float */
        transition: border-color 160ms ease, box-shadow 220ms ease, transform 220ms cubic-bezier(0.16,1,0.3,1);
        animation: cellIn 360ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      /* Hairline sheen along the very top edge. */
      .dashboard-cell::before {
        content: '';
        position: absolute; inset: 0 0 auto 0; height: 1px;
        background: linear-gradient(90deg, transparent, color-mix(in oklch, var(--copper) 35%, transparent), transparent);
        opacity: 0.6; pointer-events: none;
      }
      .dashboard-cell:hover {
        border-color: var(--cell-border-hov);
        box-shadow:
          0 1px 0 var(--cell-hi-top) inset,
          0 10px 30px var(--cell-shadow),
          0 0 0 1px color-mix(in oklch, var(--copper) 12%, transparent);
        transform: translateY(-1px);
      }
      @keyframes cellIn {
        from { opacity: 0; transform: translateY(8px) scale(0.992); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }
      /* it11 — staggered entrance choreography (cells cascade in on load). */
      .dashboard-cell:nth-child(1)  { animation-delay: 0ms; }
      .dashboard-cell:nth-child(2)  { animation-delay: 45ms; }
      .dashboard-cell:nth-child(3)  { animation-delay: 90ms; }
      .dashboard-cell:nth-child(4)  { animation-delay: 135ms; }
      .dashboard-cell:nth-child(5)  { animation-delay: 180ms; }
      .dashboard-cell:nth-child(6)  { animation-delay: 225ms; }
      .dashboard-cell:nth-child(7)  { animation-delay: 270ms; }
      .dashboard-cell:nth-child(8)  { animation-delay: 315ms; }
      .dashboard-cell:nth-child(9)  { animation-delay: 360ms; }
      .dashboard-cell:nth-child(10) { animation-delay: 405ms; }
      .dashboard-cell:nth-child(11) { animation-delay: 450ms; }
      .dashboard-cell:nth-child(12) { animation-delay: 495ms; }
      .dashboard-cell:nth-child(n+13) { animation-delay: 540ms; }
      @media (prefers-reduced-motion: reduce) {
        .dashboard-cell { animation: none; }
        .dashboard-cell:hover { transform: none; }
      }

      /* ── v2 Panel components ────────────────────────────────────────── */
      .panel-header {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 8px 14px;
        border-bottom: 1px solid transparent;
        border-image: linear-gradient(90deg, var(--header-sep), transparent 85%) 1;
        flex-shrink: 0;
        cursor: pointer; /* CC5: click header to focus/expand this panel */
        transition: background 160ms ease;
      }
      .panel-header:hover { background: color-mix(in oklch, var(--copper) 5%, transparent); }
      .panel-header:hover .panel-label { color: var(--amber); }
      .panel-header:hover .panel-label::before { background: var(--amber); box-shadow: 0 0 8px var(--amber); }

      /* #211: per-module action bar (Pause / Task / Goal) inside a panel header. */
      .panel-actions { display: flex; align-items: center; gap: 4px; margin-left: auto; }
      .panel-act-btn {
        font-family: var(--font-mono, monospace); font-size: 10px;
        color: var(--txt-dim, #aaa); background: var(--card-hi, #222);
        border: 1px solid var(--line, #363c30); border-radius: 5px;
        padding: 2px 7px; cursor: pointer; white-space: nowrap;
        transition: border-color 120ms, color 120ms;
      }
      .panel-act-btn:hover { border-color: var(--amber, #c07840); color: var(--amber, #c07840); }

      .panel-label {
        position: relative;
        display: inline-flex; align-items: center; gap: 8px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--accent-panel, var(--copper));
      }
      /* Leading accent tick before every panel label. */
      .panel-label::before {
        content: '';
        width: 3px; height: 12px; border-radius: 2px;
        background: var(--accent-panel, var(--copper));
        transition: background 160ms ease, box-shadow 160ms ease;
      }

      /* it8 — per-domain signature accents. Each panel carries a domain hue on
         its label + tick + top sheen, so the eye learns the board by color. */
      [data-plugin-id="escalations"], [data-plugin-id="needs-you"] { --accent-panel: var(--red, oklch(0.66 0.17 25)); }
      [data-plugin-id="crew-board"], [data-plugin-id="crew-board-full"], [data-plugin-id="kpi"] { --accent-panel: var(--amber); }
      [data-plugin-id="gpu"], [data-plugin-id="system"], [data-plugin-id="terminal"] { --accent-panel: var(--copper); }
      [data-plugin-id="telemetry"], [data-plugin-id="tokens-day"], [data-plugin-id="actions-log"], [data-plugin-id="activity-feed"] { --accent-panel: var(--cyan, oklch(0.80 0.10 200)); }
      [data-plugin-id="graph"], [data-plugin-id="git-activity"] { --accent-panel: var(--green, oklch(0.80 0.16 150)); }
      [data-plugin-id="docker"] { --accent-panel: var(--cyan, oklch(0.72 0.10 235)); }
      [data-plugin-id="content-gallery"] { --accent-panel: var(--copper, oklch(0.74 0.16 330)); }
      [data-plugin-id="agenda"], [data-plugin-id="clock"] { --accent-panel: var(--faint); }

      /* ── P4 hybrid mode ────────────────────────────────────────────────── */
      /* Mode toggle button: amber when focus, dim when ambient. */
      .act-mode { font-variant-numeric: tabular-nums; }
      body.mode-focus .act-mode {
        color: var(--ink, oklch(0.16 0.01 70));
        background: var(--amber);
        border-color: var(--amber);
      }
      /* DL1: one mode — the mutating controls (pause/task/goal) are ALWAYS
         visible/usable (the ambient/focus split was removed). */
      /* Ambient = calm: stop only INFINITE/looping pulses (the 24/7 cost). We
         must NOT touch one-shot entry/fade-in animations — pausing those freezes
         the panel at its opacity:0 start frame and the whole cell renders black.
         So scope the pause to the known infinite-pulse utility classes only. */
      body.mode-ambient [class*="pulse"],
      body.mode-ambient [class*="-live"],
      body.mode-ambient .live-dot,
      body.mode-ambient .visualizer,
      body.mode-ambient .viz-bar {
        animation-play-state: paused !important;
      }
      /* Heavy live renderers suspended in ambient get a peek veil + label. */
      .dashboard-cell[data-suspended="1"] { position: relative; }
      .dashboard-cell[data-suspended="1"]::after {
        content: "ambient · click ◐ Focus to interact";
        position: absolute; inset: 0; display: flex;
        align-items: flex-end; justify-content: center; padding-bottom: 10px;
        font: 11px/1.2 ui-monospace, monospace; letter-spacing: 0.04em;
        color: var(--faint, oklch(0.62 0.02 70));
        background: linear-gradient(to bottom, transparent 55%, var(--suspended-veil));
        pointer-events: none;
      }
      /* Focus chrome: a hairline amber frame (the top-right "FOCUS" pill was removed). */
      body.mode-focus #dashboard-grid {
        outline: 1px solid var(--amber); outline-offset: -1px;
      }
      /* tint the top sheen to match the domain accent */
      .dashboard-cell::before { background: linear-gradient(90deg, transparent, var(--accent-panel, var(--copper)), transparent); opacity: 0.28; }

      /* ── Themed scrollbars everywhere (sexy consistency) ─────────────── */
      *::-webkit-scrollbar { width: 7px; height: 7px; }
      *::-webkit-scrollbar-track { background: transparent; }
      *::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb); border-radius: 4px;
        border: 1px solid transparent; background-clip: padding-box;
      }
      *::-webkit-scrollbar-thumb:hover { background: color-mix(in oklch, var(--copper) 60%, transparent); }
      * { scrollbar-width: thin; scrollbar-color: var(--scrollbar-thumb) transparent; }

      /* Crew board v2 */
      .hero-progress-bar {
        position: relative;
        width: 100%;
        height: 5px;
        background: var(--track-bg);
        border-radius: 3px;
        margin: 8px 0;
        overflow: hidden;
      }
      .hero-progress-fill {
        position: relative;
        height: 100%;
        background: linear-gradient(90deg, var(--copper), var(--amber));
        border-radius: 3px;
        box-shadow: 0 0 10px color-mix(in oklch, var(--amber) 55%, transparent);
        transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
        overflow: hidden;
      }
      /* Travelling sheen across the filled portion. */
      .hero-progress-fill::after {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent, color-mix(in oklch, var(--ink) 45%, transparent), transparent);
        transform: translateX(-100%);
        animation: progressSheen 1.9s ease-in-out infinite;
      }
      @media (prefers-reduced-motion: reduce) { .hero-progress-fill::after { animation: none; } }
      @keyframes progressSheen {
        0% { transform: translateX(-100%); }
        60%, 100% { transform: translateX(100%); }
      }
      .hero-stalled {
        color: var(--amber);
        font-size: 10px;
        font-weight: 600;
      }

      /* GPU v2 */
      .gpu-panel-inner { padding: 10px; overflow-y: auto; height: 100%; }
      .gpu-card-v2 {
        background: var(--bg2);
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 10px;
        margin-bottom: 8px;
      }
      .gpu-card-name { font-size: 11px; font-weight: 600; color: var(--dim); margin-bottom: 6px; }
      .gpu-card-util { margin-bottom: 6px; }
      .gpu-bar-track { height: 6px; background: var(--line); border-radius: 3px; margin-bottom: 4px; }
      .gpu-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
      .gpu-bar-val { font-size: 10px; font-family: var(--font-mono); color: var(--dim); }

      /* ── GPU card v3 (CC3): per-card util + vram bars + role tag ──────── */
      .gpu-card-v3 {
        background: var(--card); border: 1px solid var(--line);
        border-radius: 7px; padding: 8px 10px; margin-bottom: 7px;
      }
      .gpu-card-top { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
      .gpu-card-top .gpu-card-name { font-size: 11px; font-weight: 600; color: var(--ink); margin: 0; }
      .gpu-role {
        font-size: 8px; font-weight: 700; letter-spacing: 0.08em;
        padding: 1px 5px; border-radius: 4px;
      }
      .gpu-role-ai     { color: var(--green, oklch(0.80 0.16 150)); background: color-mix(in oklch, var(--green) 14%, transparent); }
      .gpu-role-gaming { color: var(--copper); background: color-mix(in oklch, var(--copper) 16%, transparent); }
      .gpu-game-tag { font-size: 9px; color: var(--amber); font-family: var(--font-mono); }
      .gpu-card-top .gpu-temp { margin-left: auto; font-size: 11px; font-family: var(--font-mono); }
      .gpu-metric { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
      .gpu-metric-lbl { font-size: 9px; color: var(--faint); width: 26px; text-transform: uppercase; letter-spacing: 0.05em; }
      .gpu-metric .gpu-bar-track { flex: 1; margin: 0; }
      .gpu-metric-val { font-size: 10px; font-family: var(--font-mono); color: var(--dim); width: 54px; text-align: right; }
      .gpu-procs {
        display: flex; flex-wrap: wrap; gap: 4px;
        margin-top: 6px; padding-top: 6px;
        border-top: 1px solid color-mix(in oklch, var(--line) 60%, transparent);
      }
      .gpu-proc-chip {
        font-size: 9px; font-family: var(--font-mono);
        color: var(--dim); background: var(--bg2);
        padding: 1px 6px; border-radius: 4px;
        white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis;
      }
      .gpu-proc-mem { color: var(--cyan, var(--copper)); }
      .gpu-proc-more { color: var(--faint); }
      .gpu-procs-idle { border-top-color: transparent; }
      .gpu-proc-empty { font-size: 9px; font-family: var(--font-mono); color: var(--faint); font-style: italic; }
      .gpu-card-meta { display: flex; gap: 10px; font-size: 11px; font-family: var(--font-mono); }
      .gpu-gaming-strip {
        display: flex; align-items: center; gap: 10px;
        padding: 8px; background: var(--bg2); border-radius: 4px; margin-bottom: 6px;
      }
      .gpu-gaming-icon { color: var(--amber); font-size: 18px; }
      .gpu-gaming-label { color: var(--amber); font-weight: 700; font-size: 12px; }
      .gpu-gaming-note { color: var(--faint); font-size: 10px; }

      /* Clock panel */
      .clock-panel {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: calc(100% - 40px); gap: 4px; padding: 10px;
      }
      .clock-time {
        font-family: var(--font-mono); font-size: 28px; font-weight: 700;
        color: var(--amber); letter-spacing: 0.06em; font-variant-numeric: tabular-nums;
      }
      .clock-date { font-size: 11px; color: var(--dim); letter-spacing: 0.06em; }
      .clock-meta { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-top: 8px; }
      .clock-meta-row { font-size: 10px; font-family: var(--font-mono); color: var(--faint); }

      /* Escalation badge v2 */
      .esc-badge-v2 {
        font-size: 11px; font-weight: 700; color: var(--faint);
        transition: color 0.3s;
      }
      .esc-badge-v2.active { color: var(--red); animation: pulse-esc 0.8s ease infinite; }
      @keyframes pulse-esc {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.6; }
      }
      .escalation-header { background: var(--esc-bg); }
      .esc-summary { padding: 10px 14px; }
      .esc-open-count { font-size: 18px; font-weight: 700; color: var(--red); font-family: var(--font-mono); }
      .esc-top-reason { font-size: 11px; color: var(--dim); display: block; margin-top: 4px; }
      .esc-auth-note { padding: 10px 14px; }

      /* Wiki Review panel (C4) */
      .wiki-review-header { display: flex; align-items: center; gap: 7px; }
      .wiki-review-badge {
        font-size: 10px; font-weight: 700; color: var(--faint);
        min-width: 16px; text-align: center; padding: 1px 5px;
        transition: color 0.3s;
      }
      .wiki-review-badge.active { color: var(--amber); }
      .wiki-review-list {
        display: flex; flex-direction: column; gap: 4px;
        padding: 6px 8px; overflow-y: auto; height: calc(100% - 40px);
      }
      .wiki-review-row {
        display: flex; align-items: center; gap: 7px;
        padding: 5px 7px; border-radius: 6px;
        border: 1px solid var(--line);
        background: color-mix(in oklch, var(--card) 60%, transparent);
      }
      .wiki-kind-tag {
        font-size: 9px; font-weight: 700; letter-spacing: 0.07em;
        padding: 1px 5px; border-radius: 4px; flex-shrink: 0; white-space: nowrap;
      }
      .wiki-kind-conflict {
        color: var(--red); background: color-mix(in oklch, var(--red) 10%, transparent);
        border: 1px solid color-mix(in oklch, var(--red) 30%, transparent);
      }
      .wiki-kind-gap {
        color: var(--amber); background: color-mix(in oklch, var(--amber) 10%, transparent);
        border: 1px solid color-mix(in oklch, var(--amber) 30%, transparent);
      }
      .wiki-kind-stale {
        color: var(--dim); background: color-mix(in oklch, var(--dim) 8%, transparent);
        border: 1px solid color-mix(in oklch, var(--line) 60%, transparent);
      }
      .wiki-review-info {
        display: flex; flex-direction: column; flex: 1; min-width: 0; gap: 1px;
      }
      .wiki-review-slug {
        font-size: 10px; font-family: var(--font-mono); color: var(--copper);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .wiki-review-summary {
        font-size: 10px; color: var(--dim);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .wiki-review-actions { display: flex; gap: 3px; flex-shrink: 0; }
      .wiki-btn {
        font-family: inherit; font-size: 11px; color: var(--dim);
        background: transparent; border: 1px solid var(--line);
        border-radius: 5px; padding: 2px 6px; cursor: pointer;
        transition: color 100ms, border-color 100ms;
      }
      .wiki-btn:hover { color: var(--amber); border-color: var(--amber); }
      .wiki-resolve:hover { color: var(--green); border-color: var(--green); }
      .wiki-dismiss:hover { color: var(--faint); border-color: var(--faint); }

      /* Telemetry v2 */
      .telemetry-charts-wrap { padding: 8px; overflow-y: auto; }

      /* Graph placeholder v2 */
      .graph-placeholder-v2 {
        display: flex; align-items: center; justify-content: center;
        height: calc(100% - 40px);
      }

      /* Agenda panel v2 */
      .agenda-panel { padding: 8px; overflow-y: auto; }

      /* Board footer */
      .board-footer {
        display: flex; gap: 12px; padding: 8px 14px;
        border-top: 1px solid var(--line);
        font-size: 10px; font-family: var(--font-mono); color: var(--faint);
        flex-shrink: 0;
      }
      .board-stat { color: var(--faint); }

      /* Crew-board v2 internals */
      .hero-body { min-width: 0; }
      .task-columns {
        display: flex; gap: 8px; flex: 1; min-height: 0; overflow: hidden;
        padding: 8px 14px;
      }
      .task-col {
        flex: 1; display: flex; flex-direction: column; min-width: 0; gap: 4px;
        overflow: hidden;
      }
      .task-col-header {
        font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--amber); flex-shrink: 0;
      }
      .task-count {
        font-family: var(--font-mono); font-size: 9px; color: var(--faint);
        margin-left: 4px;
      }

      /* Topbar tier badge */
      #topbar-tier {
        font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
        color: var(--faint); font-family: var(--font-mono);
      }
      #topbar-tier[data-tier="idle"]    { color: var(--green); }
      #topbar-tier[data-tier="busy"]    { color: var(--amber); }
      #topbar-tier[data-tier="gaming"]  { color: var(--red); }
      #topbar-tier[data-tier="offline"] { color: var(--faint); }

      /* Suno player v2 (inside plugin cell) */
      .suno-player-wrap { padding: 8px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; height: calc(100% - 40px); }
      .suno-now-playing { display: flex; gap: 10px; align-items: flex-start; }
      .suno-art { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; border: 1px solid var(--line); flex-shrink: 0; }
      .suno-now-info { flex: 1; min-width: 0; }
